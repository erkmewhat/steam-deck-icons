<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <rect width="144" height="144" rx="12" fill="#1a1a2e"/>
  <!-- Steering wheel outer ring -->
  <circle cx="72" cy="64" r="36" fill="none" stroke="#e74c3c" stroke-width="4"/>
  <!-- Steering wheel inner hub -->
  <circle cx="72" cy="64" r="8" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <!-- Steering wheel spokes -->
  <line x1="72" y1="56" x2="72" y2="36" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="40" y2="72" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="64" x2="104" y2="72" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <!-- Flat bottom of steering wheel -->
  <path d="M50 88 Q72 82 94 88" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <!-- ACE text -->
  <text x="72" y="126" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#e74c3c" letter-spacing="2">ACE</text>
</svg>
