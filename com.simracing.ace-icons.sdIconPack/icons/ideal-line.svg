<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gil-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gil-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gil-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gil-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff4444"/>
    </linearGradient>
    <linearGradient id="gil-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gil-bg)" stroke="url(#gil-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gil-shine)"/>
  <!-- Track edges -->
  <path d="M20,92 Q40,40 72,50 Q104,60 124,36" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.3"/>
  <path d="M20,100 Q40,56 72,66 Q104,76 124,48" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.3"/>
  <!-- Racing line (ideal) -->
  <path d="M20,96 Q45,44 72,56 Q100,68 124,40" fill="none" stroke="url(#gil-line)" stroke-width="3" stroke-linecap="round"/>
  <!-- Braking zones -->
  <circle cx="44" cy="62" r="4" fill="#ff4444" opacity="0.4"/>
  <circle cx="106" cy="48" r="4" fill="#ff4444" opacity="0.4"/>
  <!-- Apex markers -->
  <circle cx="72" cy="56" r="3" fill="#4ade80" opacity="0.7"/>
  <circle cx="72" cy="56" r="5" fill="none" stroke="#4ade80" stroke-width="0.8" opacity="0.4"/>
  <!-- Speed zones text -->
  <text x="30" y="82" font-family="Arial,Helvetica,sans-serif" font-size="6" fill="#4ade80" opacity="0.5">FULL</text>
  <text x="80" y="84" font-family="Arial,Helvetica,sans-serif" font-size="6" fill="#ffaa00" opacity="0.5">LIFT</text>
  <!-- Glass reflection -->
  <ellipse cx="60" cy="42" rx="20" ry="4" fill="#ffffff" opacity="0.06"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gil-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">RACE LINE</text>
</svg>