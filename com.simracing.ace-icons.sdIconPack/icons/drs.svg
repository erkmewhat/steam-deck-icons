  <!-- Small airflow arrows in gap -->
  <path d="M50 37 L56 34 L56 40Z" fill="#fff300" opacity="0.3"/>
  <path d="M72 37 L78 34 L78 40Z" fill="#fff300" opacity="0.3"/>
  <path d="M94 37 L100 34 L100 40Z" fill="#fff300" opacity="0.3"/>
  <!-- DRS text bold yellow -->
  <!-- DRS text shadow -->
  <text x="73" y="87" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="bold" fill="#ccb800" opacity="0.3"/>

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">DRS</text>
</svg>