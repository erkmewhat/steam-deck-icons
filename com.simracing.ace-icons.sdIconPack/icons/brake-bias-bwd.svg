<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gbbr-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gbbr-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gbbr-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gbbr-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
    <linearGradient id="gbbr-indicator" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gbbr-bg1)" stroke="url(#gbbr-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gbbr-shine)"/>
  <!-- BB label -->
  <text x="72" y="46" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#ffaa00" letter-spacing="1">BB</text>
  <!-- Slider track -->
  <rect x="26" y="62" width="92" height="8" rx="4" fill="#333333" stroke="#555555" stroke-width="0.5"/>
  <!-- Track markings -->
  <line x1="48" y1="62" x2="48" y2="70" stroke="#555555" stroke-width="0.5"/>
  <line x1="72" y1="62" x2="72" y2="70" stroke="#666666" stroke-width="0.8"/>
  <line x1="96" y1="62" x2="96" y2="70" stroke="#555555" stroke-width="0.5"/>
  <!-- Indicator shifted right/rear -->
  <rect x="86" y="56" width="20" height="20" rx="4" fill="url(#gbbr-indicator)" stroke="#ff8800" stroke-width="0.8"/>
  <ellipse cx="96" cy="62" rx="6" ry="3" fill="#ffffff" opacity="0.2"/>
  <!-- FRONT / REAR labels -->
  <text x="36" y="90" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="bold" fill="#666666" letter-spacing="0.5">FRONT</text>
  <text x="108" y="90" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="bold" fill="#ffaa00" letter-spacing="0.5">REAR</text>
  <!-- Arrow pointing right -->
  <polygon points="72,96 82,92 82,100" fill="#ff6600" opacity="0.8"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gbbr-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">BB REAR</text>
</svg>