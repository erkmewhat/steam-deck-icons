<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect width="144" height="144" rx="12" fill="#1a1a2e"/>
  <!-- BB text -->
  <text x="72" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#e67e22">BB</text>
  <!-- Car body silhouette (side view, simplified) -->
  <rect x="28" y="68" width="88" height="18" rx="6" fill="#444" opacity="0.6"/>
  <!-- Front wheel (highlighted - bias forward) -->
  <circle cx="46" cy="90" r="12" fill="none" stroke="#e67e22" stroke-width="4"/>
  <circle cx="46" cy="90" r="4" fill="#e67e22"/>
  <!-- Rear wheel (dimmed) -->
  <circle cx="98" cy="90" r="12" fill="none" stroke="#666" stroke-width="3"/>
  <circle cx="98" cy="90" r="4" fill="#666"/>
  <!-- Forward arrow pointing to front wheel -->
  <path d="M80 62 L56 62" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M62 55 L52 62 L62 69" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="72" y="126" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" opacity="0.8">BB FRONT</text>
</svg>
