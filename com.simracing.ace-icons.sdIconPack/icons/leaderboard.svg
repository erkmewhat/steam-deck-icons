<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gldr-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gldr-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gldr-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gldr-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gldr-bg)" stroke="url(#gldr-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gldr-shine)"/>
  <!-- Leaderboard panel -->
  <rect x="30" y="32" width="84" height="68" rx="4" fill="#4ade80" stroke="#4ade80" stroke-width="1" opacity="0.4"/>
  <!-- Header row -->
  <rect x="32" y="34" width="80" height="10" rx="2" fill="#4ade80" opacity="0.15"/>
  <text x="42" y="42" font-family="Arial,Helvetica,sans-serif" font-size="6" font-weight="bold" fill="#4ade80" opacity="0.8">POS</text>
  <text x="72" y="42" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="6" font-weight="bold" fill="#4ade80" opacity="0.8">DRIVER</text>
  <text x="104" y="42" text-anchor="end" font-family="Arial,Helvetica,sans-serif" font-size="6" font-weight="bold" fill="#4ade80" opacity="0.8">GAP</text>
  <!-- Row 1 (highlighted) -->
  <rect x="32" y="46" width="80" height="10" rx="1" fill="#4ade80" opacity="0.1"/>
  <text x="40" y="54" font-family="Arial,Helvetica,sans-serif" font-size="7" font-weight="bold" fill="#4ade80">1</text>
  <rect x="50" y="48" width="30" height="6" rx="1" fill="#4ade80" opacity="0.3"/>
  <text x="104" y="54" text-anchor="end" font-family="Arial,Helvetica,sans-serif" font-size="6" fill="#4ade80" opacity="0.7">---</text>
  <!-- Row 2 -->
  <text x="40" y="66" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#4ade80" opacity="0.6">2</text>
  <rect x="50" y="60" width="26" height="6" rx="1" fill="#4ade80" opacity="0.15"/>
  <text x="104" y="66" text-anchor="end" font-family="Arial,Helvetica,sans-serif" font-size="6" fill="#4ade80" opacity="0.5">+0.4</text>
  <!-- Row 3 -->
  <text x="40" y="78" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#4ade80" opacity="0.6">3</text>
  <rect x="50" y="72" width="24" height="6" rx="1" fill="#4ade80" opacity="0.15"/>
  <text x="104" y="78" text-anchor="end" font-family="Arial,Helvetica,sans-serif" font-size="6" fill="#4ade80" opacity="0.5">+1.2</text>
  <!-- Row 4 -->
  <text x="40" y="90" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#4ade80" opacity="0.4">4</text>
  <rect x="50" y="84" width="28" height="6" rx="1" fill="#4ade80" opacity="0.1"/>
  <text x="104" y="90" text-anchor="end" font-family="Arial,Helvetica,sans-serif" font-size="6" fill="#4ade80" opacity="0.4">+2.8</text>
  <!-- Glass reflection -->
  <rect x="34" y="35" width="30" height="2" rx="1" fill="#ffffff" opacity="0.08"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gldr-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#ffffff" letter-spacing="1.5">LEADERBOARD</text>
</svg>