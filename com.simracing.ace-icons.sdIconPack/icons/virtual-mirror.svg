<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect x="4" y="4" width="136" height="136" rx="12" fill="#212529" stroke="#e20613" stroke-width="2"/>
  <rect x="8" y="8" width="128" height="128" rx="10" fill="none" stroke="#2d3238" stroke-width="1"/>
  <!-- Wide rectangular mirror -->
  <rect x="18" y="36" width="108" height="48" rx="6" fill="#1a2030" stroke="#ffffff" stroke-width="2"/>
  <!-- Mirror glass inner highlight -->
  <line x1="22" y1="40" x2="50" y2="40" stroke="#444" stroke-width="1" opacity="0.5"/>
  <!-- Reflected car 1 (center, closest) -->
  <g transform="translate(72, 60)">
    <rect x="-8" y="-4" width="16" height="8" rx="2" fill="#4a9eff" opacity="0.7"/>
    <rect x="-5" y="-7" width="10" height="4" rx="1.5" fill="#4a9eff" opacity="0.5"/>
    <circle cx="-5" cy="0" r="1.2" fill="#fff300" opacity="0.6"/>
    <circle cx="5" cy="0" r="1.2" fill="#fff300" opacity="0.6"/>
  </g>
  <!-- Reflected car 2 (left, farther) -->
  <g transform="translate(40, 62)">
    <rect x="-5" y="-3" width="10" height="6" rx="1.5" fill="#4a9eff" opacity="0.5"/>
    <rect x="-3" y="-5" width="6" height="3" rx="1" fill="#4a9eff" opacity="0.35"/>
    <circle cx="-3" cy="0" r="1" fill="#fff300" opacity="0.4"/>
    <circle cx="3" cy="0" r="1" fill="#fff300" opacity="0.4"/>
  </g>
  <!-- Reflected car 3 (right, farther) -->
  <g transform="translate(104, 62)">
    <rect x="-5" y="-3" width="10" height="6" rx="1.5" fill="#4a9eff" opacity="0.5"/>
    <rect x="-3" y="-5" width="6" height="3" rx="1" fill="#4a9eff" opacity="0.35"/>
    <circle cx="-3" cy="0" r="1" fill="#fff300" opacity="0.4"/>
    <circle cx="3" cy="0" r="1" fill="#fff300" opacity="0.4"/>
  </g>
  <!-- Road lines in mirror reflection -->
  <line x1="72" y1="72" x2="72" y2="80" stroke="#555" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  <line x1="52" y1="76" x2="42" y2="80" stroke="#555" stroke-width="0.5" opacity="0.3"/>
  <line x1="92" y1="76" x2="102" y2="80" stroke="#555" stroke-width="0.5" opacity="0.3"/>
  <!-- Mirror bracket -->
  <rect x="64" y="84" width="16" height="6" rx="2" fill="#555"/>
  <!-- Virtual indicator dots -->
  <circle cx="30" cy="100" r="2" fill="#4a9eff" opacity="0.5"/>
  <circle cx="72" cy="100" r="2" fill="#4a9eff" opacity="0.5"/>
  <circle cx="114" cy="100" r="2" fill="#4a9eff" opacity="0.5"/>

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">MIRROR</text>
</svg>