<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gvm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gvm-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gvm-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gvm-mirror" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ab0ff"/>
      <stop offset="100%" stop-color="#1a3050"/>
    </linearGradient>
    <linearGradient id="gvm-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gvm-bg)" stroke="url(#gvm-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gvm-shine)"/>
  <!-- Mirror frame -->
  <rect x="22" y="40" width="100" height="42" rx="6" fill="url(#gvm-mirror)" stroke="#4a9eff" stroke-width="1.5" opacity="0.85"/>
  <!-- Mirror reflection - road lines -->
  <line x1="72" y1="82" x2="52" y2="44" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
  <line x1="72" y1="82" x2="92" y2="44" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
  <!-- Cars in mirror -->
  <rect x="58" y="56" width="10" height="6" rx="2" fill="#4a9eff" opacity="0.6"/>
  <rect x="76" y="60" width="8" height="5" rx="2" fill="#4a9eff" opacity="0.4"/>
  <!-- Mirror glass shine -->
  <rect x="26" y="42" width="50" height="3" rx="1.5" fill="#ffffff" opacity="0.15"/>
  <ellipse cx="72" cy="55" rx="30" ry="6" fill="#ffffff" opacity="0.06"/>
  <!-- Reflection arrows -->
  <polyline points="38,92 48,88 48,96" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <polyline points="106,92 96,88 96,96" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gvm-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">MIRROR</text>
</svg>