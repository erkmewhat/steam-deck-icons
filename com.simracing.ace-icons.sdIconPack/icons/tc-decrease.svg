<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gtcd-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gtcd-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gtcd-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gtcd-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="gtcd-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gtcd-bg1)" stroke="url(#gtcd-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gtcd-shine)"/>
  <!-- Warm red glass triangle -->
  <polygon points="60,32 24,92 96,92" fill="url(#gtcd-red)" opacity="0.2" stroke="url(#gtcd-red)" stroke-width="1.5"/>
  <polygon points="60,42 32,86 88,86" fill="url(#gtcd-red)" opacity="0.1"/>
  <!-- Glass highlight on triangle -->
  <polygon points="60,38 42,68 78,68" fill="#ffffff" opacity="0.08"/>
  <!-- TC text -->
  <text x="60" y="78" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="bold" fill="url(#gtcd-red)" letter-spacing="2">TC</text>
  <!-- Red down arrow -->
  <polygon points="118,90 108,74 113,74 113,50 123,50 123,74 128,74" fill="#e20613" opacity="0.9"/>
  <ellipse cx="118" cy="54" rx="4" ry="2" fill="#ffffff" opacity="0.2"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gtcd-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">TC -</text>
</svg>