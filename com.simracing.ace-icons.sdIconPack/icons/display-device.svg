<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gdd-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gdd-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gdd-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gdd-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334455" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a2233" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="gdd-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gdd-bg1)" stroke="url(#gdd-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gdd-shine)"/>
  <!-- Monitor frame -->
  <rect x="28" y="26" width="88" height="56" rx="4" fill="#444444" stroke="#666666" stroke-width="1"/>
  <!-- Screen -->
  <rect x="32" y="30" width="80" height="48" rx="2" fill="url(#gdd-screen)"/>
  <!-- Screen content lines -->
  <rect x="38" y="38" width="40" height="2" rx="1" fill="#5588aa" opacity="0.5"/>
  <rect x="38" y="44" width="55" height="2" rx="1" fill="#5588aa" opacity="0.4"/>
  <rect x="38" y="50" width="30" height="2" rx="1" fill="#5588aa" opacity="0.3"/>
  <!-- Screen glow -->
  <ellipse cx="72" cy="54" rx="30" ry="16" fill="#4488aa" opacity="0.08"/>
  <!-- Monitor stand -->
  <rect x="64" y="82" width="16" height="10" rx="1" fill="#555555" stroke="#666666" stroke-width="0.5"/>
  <!-- Monitor base -->
  <rect x="50" y="92" width="44" height="4" rx="2" fill="#555555" stroke="#666666" stroke-width="0.5"/>
  <!-- Glass highlight on screen -->
  <ellipse cx="60" cy="38" rx="20" ry="6" fill="#ffffff" opacity="0.08"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gdd-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">DISPLAY</text>
</svg>