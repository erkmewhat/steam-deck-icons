<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="ghf-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="ghf-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="ghf-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ghf-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff300"/>
      <stop offset="40%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ghf-housing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cccccc"/>
      <stop offset="50%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#555555"/>
    </linearGradient>
    <linearGradient id="ghf-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
    <radialGradient id="ghf-burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fff300" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#ffaa00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#ghf-bg1)" stroke="url(#ghf-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#ghf-shine)"/>
  <!-- Lamp housing -->
  <path d="M22,54 Q22,40 32,40 L42,40 Q48,40 48,50 L48,74 Q48,80 42,80 L32,80 Q22,80 22,70 Z" fill="url(#ghf-housing)" stroke="#aaa" stroke-width="0.8"/>
  <ellipse cx="35" cy="60" rx="7" ry="12" fill="#fff300" opacity="0.6"/>
  <ellipse cx="33" cy="55" rx="3" ry="5" fill="#ffffff" opacity="0.2"/>
  <!-- Beams -->
  <polygon points="48,54 100,40 100,48 48,58" fill="url(#ghf-beam)" opacity="0.6"/>
  <polygon points="48,59 100,56 100,64 48,63" fill="url(#ghf-beam)" opacity="0.7"/>
  <polygon points="48,64 100,70 100,78 48,68" fill="url(#ghf-beam)" opacity="0.6"/>
  <!-- Flash burst -->
  <circle cx="108" cy="60" r="22" fill="url(#ghf-burst)"/>
  <circle cx="108" cy="60" r="8" fill="#ffffff" opacity="0.7"/>
  <!-- Radiating flash lines -->
  <line x1="108" y1="60" x2="108" y2="28" stroke="#fff300" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="108" y1="60" x2="108" y2="92" stroke="#fff300" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="108" y1="60" x2="134" y2="60" stroke="#fff300" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="108" y1="60" x2="130" y2="38" stroke="#fff300" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="108" y1="60" x2="130" y2="82" stroke="#fff300" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="108" y1="60" x2="120" y2="34" stroke="#fff300" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="108" y1="60" x2="120" y2="86" stroke="#fff300" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Chrome highlight -->
  <ellipse cx="35" cy="50" rx="5" ry="3" fill="#ffffff" opacity="0.2"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#ghf-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">FLASH</text>
</svg>