<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="grl-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="grl-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="grl-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="grl-redbeam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2222"/>
      <stop offset="40%" stop-color="#cc1111" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="grl-housing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cccccc"/>
      <stop offset="50%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#555555"/>
    </linearGradient>
    <linearGradient id="grl-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
    <radialGradient id="grl-redglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="60%" stop-color="#cc0000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#grl-bg1)" stroke="url(#grl-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#grl-shine)"/>
  <!-- Red rear light housing -->
  <rect x="22" y="44" width="36" height="52" rx="6" fill="url(#grl-housing)" stroke="#aaa" stroke-width="0.8"/>
  <rect x="25" y="47" width="30" height="46" rx="4" fill="#cc0000"/>
  <circle cx="40" cy="70" r="18" fill="url(#grl-redglow)"/>
  <ellipse cx="37" cy="58" rx="8" ry="4" fill="#ffffff" opacity="0.2"/>
  <!-- Red beams -->
  <polygon points="58,58 130,40 130,48 58,63" fill="url(#grl-redbeam)" opacity="0.7"/>
  <polygon points="58,65 130,58 130,66 58,69" fill="url(#grl-redbeam)" opacity="0.8"/>
  <polygon points="58,71 130,72 130,80 58,75" fill="url(#grl-redbeam)" opacity="0.8"/>
  <polygon points="58,77 130,88 130,96 58,82" fill="url(#grl-redbeam)" opacity="0.7"/>
  <!-- Wavy rain lines -->
  <path d="M80,38 Q84,42 80,46 Q76,50 80,54" stroke="#6699cc" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M92,34 Q96,38 92,42 Q88,46 92,50" stroke="#6699cc" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M104,40 Q108,44 104,48 Q100,52 104,56" stroke="#6699cc" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M116,36 Q120,40 116,44 Q112,48 116,52" stroke="#6699cc" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#grl-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">RAIN LIGHTS</text>
</svg>