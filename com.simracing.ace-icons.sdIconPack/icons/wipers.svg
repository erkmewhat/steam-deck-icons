<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect width="144" height="144" rx="12" fill="#1a1a2e"/>
  <!-- Windshield outline -->
  <path d="M25 95 L45 30 Q72 20 99 30 L119 95" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wiper pivot point -->
  <circle cx="72" cy="95" r="4" fill="#3498db"/>
  <!-- Wiper arm 1 - current position -->
  <line x1="72" y1="95" x2="45" y2="38" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Wiper blade 1 -->
  <line x1="45" y1="38" x2="38" y2="42" stroke="#3498db" stroke-width="4" stroke-linecap="round"/>
  <!-- Wiper arm 2 - swept position -->
  <line x1="72" y1="95" x2="99" y2="38" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Wiper blade 2 -->
  <line x1="99" y1="38" x2="106" y2="42" stroke="#3498db" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <!-- Arc showing sweep -->
  <path d="M48 42 Q72 22 96 42" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <!-- Label -->
  <text x="72" y="124" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3498db" opacity="0.9">WIPERS</text>
</svg>
