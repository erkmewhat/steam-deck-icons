  <path d="M32 52 L48 52 L80 34 L80 44 L48 58 L32 58Z" fill="white" opacity="0.3"/>
  <!-- Horn darker bottom -->
  <path d="M32 66 L48 66 L80 80 L80 90 L48 72 L32 72Z" fill="#aaa" opacity="0.4"/>
  <!-- Bell opening detail -->
  <line x1="80" y1="34" x2="80" y2="90" stroke="#bbb" stroke-width="2"/>
  <!-- Sound wave arcs with progressive transparency -->
  <path d="M90 44 Q102 60 90 78" fill="none" stroke="#fff300" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M100 36 Q116 60 100 86" fill="none" stroke="#fff300" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M110 28 Q130 60 110 94" fill="none" stroke="#fff300" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">HORN</text>
</svg>