<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="v2bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <filter id="v2glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="v2acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00BFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00BFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#v2bg)"/>
  <!-- Stacked page cards (back to front, offset) suggesting multiple pages -->
  <rect x="52" y="22" width="60" height="72" rx="6" fill="#1a1e24" stroke="#3a4048" stroke-width="1.5"/>
  <rect x="42" y="28" width="60" height="72" rx="6" fill="#1e2228" stroke="#4a5058" stroke-width="1.5"/>
  <!-- Front card with mini button grid -->
  <rect x="32" y="34" width="60" height="72" rx="6" fill="#242830" stroke="#00BFFF" stroke-width="1.5" filter="url(#v2glow)"/>
  <!-- Mini grid dots on front card (representing buttons) -->
  <circle cx="48" cy="54" r="4" fill="#00BFFF" opacity="0.7"/>
  <circle cx="62" cy="54" r="4" fill="#00BFFF" opacity="0.5"/>
  <circle cx="76" cy="54" r="4" fill="#00BFFF" opacity="0.3"/>
  <circle cx="48" cy="70" r="4" fill="#00BFFF" opacity="0.5"/>
  <circle cx="62" cy="70" r="4" fill="#00BFFF" opacity="0.3"/>
  <circle cx="76" cy="70" r="4" fill="#00BFFF" opacity="0.2"/>
  <circle cx="48" cy="86" r="4" fill="#00BFFF" opacity="0.3"/>
  <circle cx="62" cy="86" r="4" fill="#00BFFF" opacity="0.2"/>
  <!-- Label -->
  <text x="72" y="130" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff" opacity="0.9">MFD</text>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#v2acc)"/>
</svg>
