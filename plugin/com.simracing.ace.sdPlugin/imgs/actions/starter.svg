<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gst-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gst-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gst-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <radialGradient id="gst-btn" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#333333"/>
      <stop offset="70%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <radialGradient id="gst-ring" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <linearGradient id="gst-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gst-bg1)" stroke="url(#gst-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gst-shine)"/>
  <!-- Red ring -->
  <circle cx="72" cy="62" r="34" fill="url(#gst-ring)"/>
  <circle cx="72" cy="62" r="30" fill="url(#gst-btn)"/>
  <!-- Reflective inner highlight -->
  <ellipse cx="72" cy="50" rx="18" ry="8" fill="#ffffff" opacity="0.08"/>
  <ellipse cx="66" cy="48" rx="10" ry="5" fill="#ffffff" opacity="0.12"/>
  <!-- START text -->
  <text x="72" y="60" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#ff3333" letter-spacing="2">START</text>
  <!-- Engine subtext -->
  <text x="72" y="72" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#ff3333" opacity="0.7" letter-spacing="1">ENGINE</text>
  <!-- Glass reflection arc -->
  <path d="M48,42 Q72,30 96,42" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gst-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">STARTER</text>
</svg>