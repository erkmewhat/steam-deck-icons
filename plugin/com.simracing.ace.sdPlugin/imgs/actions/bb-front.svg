<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect x="4" y="4" width="136" height="136" rx="12" fill="#212529" stroke="#e20613" stroke-width="2"/>
  <rect x="8" y="8" width="128" height="128" rx="10" fill="none" stroke="#2d3238" stroke-width="1"/>
  <!-- Left arrow pointing toward front -->
  <polygon points="20,62 34,50 34,56 48,56 48,68 34,68 34,74" fill="white"/>
  <!-- Car silhouette side view (facing left) -->
  <g transform="translate(85,58)">
    <!-- Car body -->
    <path d="M-30,0 L-28,-6 -18,-6 -14,-16 14,-16 22,-6 30,-6 30,2 -30,2 Z" fill="#777" stroke="#555" stroke-width="0.5"/>
    <!-- Roof highlight -->
    <path d="M-12,-16 L12,-16 20,-6 -16,-6 Z" fill="#888" opacity="0.5"/>
    <!-- Windows -->
    <path d="M-11,-14 L10,-14 16,-6 -14,-6 Z" fill="#444" opacity="0.6"/>
    <!-- Front wheel (highlighted - brake bias forward) -->
    <circle cx="20" cy="5" r="6" fill="#333"/>
    <circle cx="20" cy="5" r="4" fill="#444"/>
    <circle cx="20" cy="5" r="2" fill="#555"/>
    <!-- Front brake caliper glow -->
    <circle cx="20" cy="5" r="8" fill="#fff300" opacity="0.25"/>
    <rect x="13" y="1" width="4" height="8" rx="1" fill="#fff300" opacity="0.8"/>
    <!-- Rear wheel (dimmed) -->
    <circle cx="-20" cy="5" r="6" fill="#333"/>
    <circle cx="-20" cy="5" r="4" fill="#444"/>
    <circle cx="-20" cy="5" r="2" fill="#555" opacity="0.5"/>
  </g>
  <!-- Label -->

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">BIAS FWD</text>
</svg>