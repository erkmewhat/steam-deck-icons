<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect x="4" y="4" width="136" height="136" rx="12" fill="#212529" stroke="#e20613" stroke-width="2"/>
  <rect x="8" y="8" width="128" height="128" rx="10" fill="none" stroke="#2d3238" stroke-width="1"/>
  <!-- Windshield outline (trapezoid) -->
  <path d="M24 94 L48 32 L88 32 L112 94" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <!-- Windshield subtle fill -->
  <path d="M24 94 L48 32 L88 32 L112 94Z" fill="white" opacity="0.03"/>
  <!-- Wiper sweep arc -->
  <path d="M48 40 A44 44 0 0 1 92 40" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.35"/>
  <!-- Wiper pivot point shadow -->
  <circle cx="69" cy="93" r="4" fill="#999" opacity="0.5"/>
  <!-- Wiper pivot point -->
  <circle cx="68" cy="92" r="3.5" fill="#bbb"/>
  <circle cx="67" cy="91" r="1.5" fill="white" opacity="0.5"/>
  <!-- Wiper arm -->
  <line x1="68" y1="92" x2="48" y2="40" stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="92" x2="48" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Wiper blade -->
  <line x1="44" y1="44" x2="52" y2="36" stroke="#ccc" stroke-width="5" stroke-linecap="round"/>
  <line x1="44" y1="44" x2="52" y2="36" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Down arrow in red -->
  <polygon points="122,62 114,46 130,46" fill="#e20613"/>
  <rect x="119" y="26" width="6" height="20" fill="#e20613"/>
  <!-- Arrow shadow -->
  <polygon points="122,62 126,50 130,46" fill="#8b0000" opacity="0.4"/>

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">WIPER -</text>
</svg>