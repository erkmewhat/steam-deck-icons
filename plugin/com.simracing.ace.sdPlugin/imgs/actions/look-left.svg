<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gll-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gll-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gll-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gll-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gll-bg1)" stroke="url(#gll-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gll-shine)"/>
  <!-- Eye shape -->
  <path d="M36,62 Q72,30 108,62 Q72,94 36,62 Z" fill="none" stroke="#cccccc" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Iris -->
  <circle cx="72" cy="62" r="14" fill="none" stroke="#cccccc" stroke-width="2"/>
  <!-- Pupil shifted left -->
  <circle cx="65" cy="62" r="7" fill="#cccccc"/>
  <circle cx="63" cy="60" r="2.5" fill="#ffffff" opacity="0.4"/>
  <!-- Left arrow -->
  <polygon points="24,62 38,52 38,72" fill="#cccccc" opacity="0.8"/>
  <!-- Eye highlight -->
  <ellipse cx="72" cy="50" rx="18" ry="5" fill="#ffffff" opacity="0.06"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gll-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">LOOK LEFT</text>
</svg>