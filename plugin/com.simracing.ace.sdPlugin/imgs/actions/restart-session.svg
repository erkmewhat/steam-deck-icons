  <rect x="72" y="24" width="4" height="4" fill="#212529"/>
  <rect x="80" y="24" width="4" height="4" fill="#212529"/>
  <!-- Inner glow effect circle -->
  <circle cx="72" cy="62" r="16" fill="none" stroke="#e20613" stroke-width="1" opacity="0.3"/>
  <circle cx="72" cy="62" r="6" fill="#e20613" opacity="0.5"/>

