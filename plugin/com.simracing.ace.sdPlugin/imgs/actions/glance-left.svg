<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="ggl-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="ggl-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="ggl-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ggl-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6bb8ff"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="ggl-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#ggl-bg)" stroke="url(#ggl-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#ggl-shine)"/>
  <!-- Eye shape -->
  <ellipse cx="72" cy="62" rx="34" ry="18" fill="none" stroke="url(#ggl-warm)" stroke-width="2.5"/>
  <ellipse cx="72" cy="62" rx="34" ry="18" fill="#4a9eff" opacity="0.08"/>
  <!-- Pupil shifted left -->
  <circle cx="60" cy="62" r="8" fill="#4a9eff" opacity="0.9"/>
  <circle cx="60" cy="62" r="3.5" fill="#0a0406"/>
  <circle cx="58" cy="59" r="1.5" fill="#ffffff" opacity="0.5"/>
  <!-- Arrow pointing left -->
  <polyline points="28,62 16,53 16,71" fill="none" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="16" y1="62" x2="36" y2="62" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <!-- Glass reflection on eye -->
  <ellipse cx="68" cy="54" rx="18" ry="5" fill="#ffffff" opacity="0.08"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#ggl-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">LOOK LEFT</text>
</svg>