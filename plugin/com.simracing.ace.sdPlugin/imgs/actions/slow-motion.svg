<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect x="4" y="4" width="136" height="136" rx="12" fill="#212529" stroke="#e20613" stroke-width="2"/>
  <rect x="8" y="8" width="128" height="128" rx="10" fill="none" stroke="#2d3238" stroke-width="1"/>
  <!-- Clock face outer ring -->
  <circle cx="72" cy="58" r="36" fill="none" stroke="#4a9eff" stroke-width="3"/>
  <circle cx="72" cy="58" r="33" fill="none" stroke="#4a9eff" stroke-width="0.5" opacity="0.3"/>
  <!-- Tick marks around edge -->
  <line x1="72" y1="24" x2="72" y2="30" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="86" x2="72" y2="92" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="58" x2="44" y2="58" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="58" x2="106" y2="58" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <!-- Minor tick marks -->
  <line x1="90" y1="28" x2="87" y2="33" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="102" y1="40" x2="97" y2="43" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="102" y1="76" x2="97" y2="73" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="90" y1="88" x2="87" y2="83" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="88" x2="57" y2="83" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="76" x2="47" y2="73" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="40" x2="47" y2="43" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="28" x2="57" y2="33" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Clock hands (slow - both near 6 o'clock area) -->
  <line x1="72" y1="58" x2="72" y2="38" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="58" x2="84" y2="70" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="72" cy="58" r="3" fill="#4a9eff"/>
  <!-- 0.5x overlay text -->
  <rect x="52" y="94" width="40" height="16" rx="3" fill="#2d3238" stroke="#4a9eff" stroke-width="1"/>

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">SLOW MO</text>
</svg>