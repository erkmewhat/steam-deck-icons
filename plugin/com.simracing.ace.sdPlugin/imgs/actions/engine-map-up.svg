<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect x="4" y="4" width="136" height="136" rx="12" fill="#212529" stroke="#e20613" stroke-width="2"/>
  <rect x="8" y="8" width="128" height="128" rx="10" fill="none" stroke="#2d3238" stroke-width="1"/>
  <!-- Up arrow -->
  <polygon points="72,16 84,28 78,28 78,34 66,34 66,28 60,28" fill="white"/>
  <!-- Engine block -->
  <g>
    <!-- Main block body -->
    <rect x="46" y="52" width="52" height="34" rx="3" fill="#fff300"/>
    <!-- Shadow on block -->
    <rect x="46" y="70" width="52" height="16" rx="3" fill="#ccb800" opacity="0.5"/>
    <!-- Cylinder head / intake manifold on top -->
    <rect x="50" y="42" width="44" height="12" rx="2" fill="#fff300"/>
    <rect x="50" y="42" width="44" height="4" rx="2" fill="#ffe84d" opacity="0.4"/>
    <!-- Intake runners -->
    <rect x="54" y="38" width="8" height="8" rx="1.5" fill="#ccb800"/>
    <rect x="68" y="38" width="8" height="8" rx="1.5" fill="#ccb800"/>
    <rect x="82" y="38" width="8" height="8" rx="1.5" fill="#ccb800"/>
    <!-- Exhaust headers on left side -->
    <path d="M46,58 L36,56 Q32,55 32,58 L32,62 Q32,65 36,64 L46,62" fill="#ccb800"/>
    <path d="M46,68 L38,66 Q34,65 34,68 L34,72 Q34,75 38,74 L46,72" fill="#ccb800"/>
    <!-- Oil pan / sump -->
    <rect x="52" y="84" width="40" height="8" rx="2" fill="#ccb800"/>
    <!-- Belt pulley on right -->
    <circle cx="104" cy="66" r="6" fill="#ccb800" stroke="#fff300" stroke-width="1.5"/>
    <circle cx="104" cy="66" r="2.5" fill="#fff300"/>
    <!-- Block detail lines -->
    <line x1="56" y1="56" x2="56" y2="80" stroke="#ccb800" stroke-width="0.8"/>
    <line x1="66" y1="56" x2="66" y2="80" stroke="#ccb800" stroke-width="0.8"/>
    <line x1="76" y1="56" x2="76" y2="80" stroke="#ccb800" stroke-width="0.8"/>
    <line x1="86" y1="56" x2="86" y2="80" stroke="#ccb800" stroke-width="0.8"/>
  </g>
  <!-- Label -->

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">ENG +</text>
</svg>