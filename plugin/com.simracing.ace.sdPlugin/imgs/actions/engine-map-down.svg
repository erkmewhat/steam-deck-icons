<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect x="4" y="4" width="136" height="136" rx="12" fill="#212529" stroke="#e20613" stroke-width="2"/>
  <rect x="8" y="8" width="128" height="128" rx="10" fill="none" stroke="#2d3238" stroke-width="1"/>
  <!-- Engine block -->
  <g>
    <!-- Main block body -->
    <rect x="46" y="38" width="52" height="34" rx="3" fill="#e20613"/>
    <!-- Shadow on block -->
    <rect x="46" y="56" width="52" height="16" rx="3" fill="#8b0000" opacity="0.5"/>
    <!-- Cylinder head / intake manifold on top -->
    <rect x="50" y="28" width="44" height="12" rx="2" fill="#e20613"/>
    <rect x="50" y="28" width="44" height="4" rx="2" fill="#ff4d4d" opacity="0.4"/>
    <!-- Intake runners -->
    <rect x="54" y="24" width="8" height="8" rx="1.5" fill="#8b0000"/>
    <rect x="68" y="24" width="8" height="8" rx="1.5" fill="#8b0000"/>
    <rect x="82" y="24" width="8" height="8" rx="1.5" fill="#8b0000"/>
    <!-- Exhaust headers on left side -->
    <path d="M46,44 L36,42 Q32,41 32,44 L32,48 Q32,51 36,50 L46,48" fill="#8b0000"/>
    <path d="M46,54 L38,52 Q34,51 34,54 L34,58 Q34,61 38,60 L46,58" fill="#8b0000"/>
    <!-- Oil pan / sump -->
    <rect x="52" y="70" width="40" height="8" rx="2" fill="#8b0000"/>
    <!-- Belt pulley on right -->
    <circle cx="104" cy="52" r="6" fill="#8b0000" stroke="#e20613" stroke-width="1.5"/>
    <circle cx="104" cy="52" r="2.5" fill="#e20613"/>
    <!-- Block detail lines -->
    <line x1="56" y1="42" x2="56" y2="66" stroke="#8b0000" stroke-width="0.8"/>
    <line x1="66" y1="42" x2="66" y2="66" stroke="#8b0000" stroke-width="0.8"/>
    <line x1="76" y1="42" x2="76" y2="66" stroke="#8b0000" stroke-width="0.8"/>
    <line x1="86" y1="42" x2="86" y2="66" stroke="#8b0000" stroke-width="0.8"/>
  </g>
  <!-- Down arrow -->
  <polygon points="72,104 84,92 78,92 78,86 66,86 66,92 60,92" fill="white"/>
  <!-- Label -->

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">ENG -</text>
</svg>