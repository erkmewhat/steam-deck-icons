<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect x="4" y="4" width="136" height="136" rx="12" fill="#212529" stroke="#e20613" stroke-width="2"/>
  <rect x="8" y="8" width="128" height="128" rx="10" fill="none" stroke="#2d3238" stroke-width="1"/>
  <!-- Rearview mirror frame (tilted slightly) -->
  <g transform="rotate(-3, 72, 55)">
    <rect x="28" y="34" width="88" height="42" rx="8" fill="#333" stroke="#999" stroke-width="2.5"/>
    <rect x="32" y="38" width="80" height="34" rx="5" fill="#1a2030"/>
    <!-- Mirror glass highlight -->
    <line x1="34" y1="40" x2="48" y2="40" stroke="#555" stroke-width="1" opacity="0.6"/>
    <!-- Car silhouette reflected in mirror -->
    <g transform="translate(72, 55)">
      <!-- Small car body -->
      <rect x="-10" y="-4" width="20" height="8" rx="2" fill="#e20613" opacity="0.8"/>
      <rect x="-7" y="-7" width="14" height="5" rx="2" fill="#e20613" opacity="0.6"/>
      <!-- Headlights (reflected) -->
      <circle cx="-8" cy="0" r="1.5" fill="#fff300" opacity="0.7"/>
      <circle cx="8" cy="0" r="1.5" fill="#fff300" opacity="0.7"/>
    </g>
  </g>
  <!-- Mirror mount stem -->
  <rect x="69" y="76" width="6" height="10" rx="1" fill="#999"/>
  <!-- Curved backward arrow -->
  <path d="M50,100 Q40,88 50,80" fill="none" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="46,80 50,73 54,80" fill="#4a9eff"/>
  <path d="M94,100 Q104,88 94,80" fill="none" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="90,80 94,73 98,80" fill="#4a9eff"/>

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">LOOK BACK</text>
</svg>