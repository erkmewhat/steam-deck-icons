<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="ghz-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="ghz-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="ghz-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ghz-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
    <linearGradient id="ghz-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff300"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#ghz-bg1)" stroke="url(#ghz-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#ghz-shine)"/>
  <!-- Warning triangle -->
  <path d="M72,22 L116,94 L28,94 Z" fill="none" stroke="url(#ghz-warn)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner glow -->
  <path d="M72,32 L108,88 L36,88 Z" fill="#ffaa00" opacity="0.06"/>
  <!-- Exclamation mark -->
  <line x1="72" y1="46" x2="72" y2="70" stroke="#fff300" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="72" cy="80" r="3.5" fill="#fff300"/>
  <!-- Glow around triangle -->
  <path d="M72,22 L116,94 L28,94 Z" fill="none" stroke="#ffaa00" stroke-width="1" stroke-linejoin="round" opacity="0.4"/>
  <!-- Glass highlight -->
  <ellipse cx="72" cy="40" rx="16" ry="6" fill="#ffffff" opacity="0.08"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#ghz-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">HAZARDS</text>
</svg>