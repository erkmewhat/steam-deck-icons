<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gdp-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gdp-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gdp-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gdp-page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dddddd"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <linearGradient id="gdp-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gdp-bg1)" stroke="url(#gdp-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gdp-shine)"/>
  <!-- Back page (shadow) -->
  <rect x="50" y="24" width="52" height="68" rx="3" fill="#555555" opacity="0.4"/>
  <!-- Main page -->
  <rect x="42" y="20" width="52" height="68" rx="3" fill="url(#gdp-page)" stroke="#aaaaaa" stroke-width="0.8"/>
  <!-- Dog ear -->
  <path d="M82,20 L94,20 L94,32 Z" fill="#bbbbbb" stroke="#aaaaaa" stroke-width="0.5"/>
  <path d="M82,20 L82,32 L94,32" fill="#cccccc" stroke="#aaaaaa" stroke-width="0.5"/>
  <!-- Text lines -->
  <rect x="50" y="34" width="30" height="2.5" rx="1" fill="#666666" opacity="0.6"/>
  <rect x="50" y="42" width="36" height="2.5" rx="1" fill="#666666" opacity="0.5"/>
  <rect x="50" y="50" width="28" height="2.5" rx="1" fill="#666666" opacity="0.5"/>
  <rect x="50" y="58" width="34" height="2.5" rx="1" fill="#666666" opacity="0.4"/>
  <rect x="50" y="66" width="20" height="2.5" rx="1" fill="#666666" opacity="0.4"/>
  <!-- Page turn arrow -->
  <polygon points="110,58 120,52 120,64" fill="#cccccc" opacity="0.7"/>
  <!-- Glass highlight -->
  <ellipse cx="62" cy="30" rx="14" ry="5" fill="#ffffff" opacity="0.1"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gdp-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">PAGE</text>
</svg>