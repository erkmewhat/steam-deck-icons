  <rect x="38" y="18" width="48" height="62" rx="4" fill="none" stroke="#3498db" stroke-width="3"/>
  <!-- Page lines -->
  <line x1="48" y1="34" x2="76" y2="34" stroke="#3498db" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="48" y1="44" x2="76" y2="44" stroke="#3498db" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="48" y1="54" x2="68" y2="54" stroke="#3498db" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Arrow pointing right/next -->
