<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect x="4" y="4" width="136" height="136" rx="12" fill="#212529" stroke="#e20613" stroke-width="2"/>
  <rect x="8" y="8" width="128" height="128" rx="10" fill="none" stroke="#2d3238" stroke-width="1"/>
  <!-- Video camera body -->
  <rect x="28" y="44" width="60" height="40" rx="6" fill="#4a9eff" opacity="0.85"/>
  <rect x="28" y="44" width="60" height="40" rx="6" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
  <!-- Camera lens detail -->
  <circle cx="58" cy="64" r="10" fill="#212529" stroke="#7bbfff" stroke-width="1.5"/>
  <circle cx="58" cy="64" r="5" fill="#2a5a8f"/>
  <circle cx="56" cy="62" r="1.5" fill="#7bbfff" opacity="0.5"/>
  <!-- Camera viewfinder bump -->
  <rect x="30" y="40" width="16" height="6" rx="2" fill="#3a8aef"/>
  <!-- Camera lens hood / front extension -->
  <polygon points="88,50 108,40 108,88 88,78" fill="#4a9eff" opacity="0.7" stroke="#4a9eff" stroke-width="1"/>
  <!-- Crosshair/gimbal overlay -->
  <circle cx="72" cy="64" r="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7" stroke-dasharray="4,3"/>
  <line x1="72" y1="38" x2="72" y2="50" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <line x1="72" y1="78" x2="72" y2="90" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <line x1="46" y1="64" x2="58" y2="64" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <line x1="86" y1="64" x2="98" y2="64" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="72" cy="64" r="2" fill="#ffffff" opacity="0.9"/>

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">FREE CAM</text>
</svg>