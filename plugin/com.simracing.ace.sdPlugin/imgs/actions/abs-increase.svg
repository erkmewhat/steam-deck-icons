<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gabi-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gabi-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gabi-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gabi-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff300"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <linearGradient id="gabi-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gabi-bg1)" stroke="url(#gabi-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gabi-shine)"/>
  <!-- Warm yellow glass circle -->
  <circle cx="58" cy="64" r="30" fill="url(#gabi-warm)" opacity="0.15" stroke="url(#gabi-warm)" stroke-width="1.5"/>
  <circle cx="58" cy="64" r="24" fill="url(#gabi-warm)" opacity="0.08"/>
  <!-- Glass highlight -->
  <ellipse cx="52" cy="50" rx="16" ry="8" fill="#ffffff" opacity="0.1"/>
  <!-- ABS text -->
  <text x="58" y="72" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="url(#gabi-warm)" letter-spacing="1">ABS</text>
  <!-- Green up arrow -->
  <polygon points="118,50 108,66 113,66 113,90 123,90 123,66 128,66" fill="#22cc22" opacity="0.9"/>
  <ellipse cx="118" cy="54" rx="4" ry="2" fill="#ffffff" opacity="0.2"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gabi-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">ABS +</text>
</svg>