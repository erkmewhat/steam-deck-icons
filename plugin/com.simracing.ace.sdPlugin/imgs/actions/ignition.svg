<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gig-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gig-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gig-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gig-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="gig-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
    <radialGradient id="gig-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff3333" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gig-bg1)" stroke="url(#gig-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gig-shine)"/>
  <!-- Glow behind symbol -->
  <circle cx="72" cy="62" r="36" fill="url(#gig-glow)"/>
  <!-- Power symbol -->
  <circle cx="72" cy="65" r="24" fill="none" stroke="url(#gig-red)" stroke-width="4" stroke-linecap="round" stroke-dasharray="0 18 95"/>
  <line x1="72" y1="41" x2="72" y2="58" stroke="url(#gig-red)" stroke-width="4" stroke-linecap="round"/>
  <!-- Glass reflection on symbol -->
  <path d="M56,50 Q72,42 88,50" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
  <!-- Key silhouette -->
  <g transform="translate(72,95) scale(0.7)">
    <circle cx="0" cy="-6" r="6" fill="none" stroke="#888888" stroke-width="2"/>
    <rect x="-2" y="0" width="4" height="16" rx="1" fill="#888888"/>
    <rect x="2" y="10" width="5" height="2" rx="0.5" fill="#888888"/>
    <rect x="2" y="6" width="4" height="2" rx="0.5" fill="#888888"/>
  </g>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gig-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">IGNITION</text>
</svg>