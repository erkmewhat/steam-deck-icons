<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect x="4" y="4" width="136" height="136" rx="12" fill="#212529" stroke="#e20613" stroke-width="2"/>
  <rect x="8" y="8" width="128" height="128" rx="10" fill="none" stroke="#2d3238" stroke-width="1"/>
  <!-- Red circular border around pause bars -->
  <circle cx="72" cy="56" r="36" fill="none" stroke="#e20613" stroke-width="2.5"/>
  <circle cx="72" cy="56" r="33" fill="none" stroke="#e20613" stroke-width="0.5" opacity="0.3"/>
  <!-- Two bold pause bars -->
  <rect x="54" y="34" width="14" height="44" rx="3" fill="white"/>
  <rect x="76" y="34" width="14" height="44" rx="3" fill="white"/>
  <!-- Subtle highlight on bars -->
  <rect x="56" y="36" width="4" height="40" rx="2" fill="#fff" opacity="0.15"/>
  <rect x="78" y="36" width="4" height="40" rx="2" fill="#fff" opacity="0.15"/>
  <!-- Checkered flag pattern at bottom -->
  <g opacity="0.6">
    <rect x="42" y="96" width="8" height="8" fill="white"/>
    <rect x="50" y="96" width="8" height="8" fill="#444"/>
    <rect x="58" y="96" width="8" height="8" fill="white"/>
    <rect x="66" y="96" width="8" height="8" fill="#444"/>
    <rect x="74" y="96" width="8" height="8" fill="white"/>
    <rect x="82" y="96" width="8" height="8" fill="#444"/>
    <rect x="90" y="96" width="8" height="8" fill="white"/>
    <rect x="42" y="104" width="8" height="8" fill="#444"/>
    <rect x="50" y="104" width="8" height="8" fill="white"/>
    <rect x="58" y="104" width="8" height="8" fill="#444"/>
    <rect x="66" y="104" width="8" height="8" fill="white"/>
    <rect x="74" y="104" width="8" height="8" fill="#444"/>
    <rect x="82" y="104" width="8" height="8" fill="white"/>
    <rect x="90" y="104" width="8" height="8" fill="#444"/>
  </g>

  <text x="72" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="white">PAUSE</text>
</svg>