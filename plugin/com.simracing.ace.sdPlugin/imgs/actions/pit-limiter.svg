<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect x="4" y="4" width="136" height="136" rx="12" fill="#212529" stroke="#e20613" stroke-width="2"/>
  <rect x="8" y="8" width="128" height="128" rx="10" fill="none" stroke="#2d3238" stroke-width="1"/>
  <!-- Sign shadow -->
  <circle cx="74" cy="58" r="36" fill="#1a1d21"/>
  <!-- Outer red circle border (thick) -->
  <circle cx="72" cy="56" r="36" fill="none" stroke="#e20613" stroke-width="4"/>
  <!-- White inner fill -->
  <circle cx="72" cy="56" r="31" fill="#e8e8e8"/>
  <!-- Inner white highlight for 3D -->
  <path d="M48 40 A28 28 0 0 1 96 40" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <!-- Bottom shadow on white circle -->
  <path d="M48 72 A28 28 0 0 0 96 72" fill="none" stroke="#bbb" stroke-width="1.5" opacity="0.5"/>
  <!-- Bold PIT text -->
  <!-- Diagonal strike-through in red -->
  <line x1="46" y1="78" x2="98" y2="34" stroke="#e20613" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Strike shadow -->
