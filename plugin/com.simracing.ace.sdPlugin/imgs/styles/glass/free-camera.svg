<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gfc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gfc-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gfc-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gfc-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6bb8ff"/>
      <stop offset="100%" stop-color="#4a9eff"/>
    </linearGradient>
    <linearGradient id="gfc-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gfc-bg)" stroke="url(#gfc-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gfc-shine)"/>
  <!-- Camera body -->
  <rect x="34" y="48" width="56" height="38" rx="5" fill="url(#gfc-body)" opacity="0.85"/>
  <rect x="34" y="48" width="56" height="38" rx="5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <!-- Lens -->
  <circle cx="62" cy="67" r="12" fill="#0a0406" stroke="#6bb8ff" stroke-width="1.5"/>
  <circle cx="62" cy="67" r="7" fill="#1a3050" stroke="#4a9eff" stroke-width="1"/>
  <circle cx="59" cy="64" r="2" fill="#ffffff" opacity="0.3"/>
  <!-- Flash/viewfinder -->
  <rect x="52" y="42" width="16" height="8" rx="2" fill="#4a9eff" opacity="0.6"/>
  <!-- Movement arrows (free) -->
  <line x1="104" y1="55" x2="104" y2="45" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <polyline points="100,49 104,45 108,49" fill="none" stroke="#4a9eff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="104" y1="79" x2="104" y2="89" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <polyline points="100,85 104,89 108,85" fill="none" stroke="#4a9eff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="114" y1="67" x2="124" y2="67" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <polyline points="120,63 124,67 120,71" fill="none" stroke="#4a9eff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glass reflection on camera -->
  <rect x="38" y="50" width="28" height="4" rx="2" fill="#ffffff" opacity="0.1"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gfc-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">FREE CAM</text>
</svg>