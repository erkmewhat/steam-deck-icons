<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gtc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gtc-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gtc-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gtc-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6bb8ff"/>
      <stop offset="100%" stop-color="#4a9eff"/>
    </linearGradient>
    <linearGradient id="gtc-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gtc-bg)" stroke="url(#gtc-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gtc-shine)"/>
  <!-- Camera on tripod/track mount -->
  <rect x="40" y="42" width="44" height="30" rx="4" fill="url(#gtc-body)" opacity="0.85"/>
  <rect x="40" y="42" width="44" height="30" rx="4" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <!-- Lens -->
  <circle cx="62" cy="57" r="10" fill="#0a0406" stroke="#6bb8ff" stroke-width="1.5"/>
  <circle cx="62" cy="57" r="5.5" fill="#1a3050"/>
  <circle cx="60" cy="55" r="1.5" fill="#ffffff" opacity="0.3"/>
  <!-- Track/road line beneath -->
  <path d="M16,92 Q72,78 128,92" fill="none" stroke="#4a9eff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M24,96 Q72,84 120,96" fill="none" stroke="#4a9eff" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Tripod mount -->
  <line x1="52" y1="72" x2="42" y2="90" stroke="#4a9eff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="72" y1="72" x2="82" y2="90" stroke="#4a9eff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="62" y1="72" x2="62" y2="90" stroke="#4a9eff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Glass reflection -->
  <rect x="44" y="44" width="22" height="3" rx="1.5" fill="#ffffff" opacity="0.1"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gtc-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">TRACK CAM</text>
</svg>