<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="ght-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="ght-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="ght-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ght-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#ght-bg)" stroke="url(#ght-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#ght-shine)"/>
  <!-- HUD display frame -->
  <rect x="24" y="36" width="96" height="56" rx="4" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.8"/>
  <rect x="24" y="36" width="96" height="56" rx="4" fill="#4ade80" opacity="0.05"/>
  <!-- Speed readout -->
  <text x="72" y="62" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold" fill="#4ade80" opacity="0.9">187</text>
  <text x="72" y="74" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#4ade80" opacity="0.6">KM/H</text>
  <!-- Gear indicator -->
  <text x="106" y="60" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#4ade80" opacity="0.7">4</text>
  <!-- RPM bar -->
  <rect x="32" y="80" width="60" height="4" rx="2" fill="#4ade80" opacity="0.4"/>
  <rect x="32" y="80" width="40" height="4" rx="2" fill="#4ade80" opacity="0.7"/>
  <!-- Lap info -->
  <text x="40" y="54" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#4ade80" opacity="0.5">L3</text>
  <!-- Glass reflections -->
  <rect x="28" y="38" width="40" height="2" rx="1" fill="#ffffff" opacity="0.1"/>
  <!-- Toggle eye icon -->
  <ellipse cx="108" cy="80" rx="6" ry="4" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.6"/>
  <circle cx="108" cy="80" r="2" fill="#4ade80" opacity="0.6"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#ght-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">HUD</text>
</svg>