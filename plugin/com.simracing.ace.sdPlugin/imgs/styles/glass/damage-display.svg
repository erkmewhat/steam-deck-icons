<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gdd-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gdd-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gdd-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gdd-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gdd-bg)" stroke="url(#gdd-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gdd-shine)"/>
  <!-- Car top-down outline -->
  <path d="M72,32 L82,38 L86,52 L86,78 L82,90 L72,94 L62,90 L58,78 L58,52 L62,38 Z" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.7"/>
  <path d="M72,32 L82,38 L86,52 L86,78 L82,90 L72,94 L62,90 L58,78 L58,52 L62,38 Z" fill="#4ade80" opacity="0.05"/>
  <!-- Wheels -->
  <rect x="50" y="44" width="6" height="12" rx="1.5" fill="#4ade80" opacity="0.5"/>
  <rect x="88" y="44" width="6" height="12" rx="1.5" fill="#4ade80" opacity="0.5"/>
  <rect x="50" y="72" width="6" height="12" rx="1.5" fill="#ff6644" opacity="0.7"/>
  <rect x="88" y="72" width="6" height="12" rx="1.5" fill="#4ade80" opacity="0.5"/>
  <!-- Damage indicators -->
  <circle cx="72" cy="36" r="3" fill="#ff6644" opacity="0.8"/>
  <line x1="38" y1="50" x2="46" y2="50" stroke="#ff6644" stroke-width="2" opacity="0.6"/>
  <!-- Warning symbol -->
  <path d="M30,72 L36,62 L42,72 Z" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.7"/>
  <text x="36" y="71" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" font-weight="bold" fill="#ffaa00" opacity="0.8">!</text>
  <!-- Glass reflection -->
  <ellipse cx="72" cy="38" rx="10" ry="3" fill="#ffffff" opacity="0.06"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gdd-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">DAMAGE</text>
</svg>