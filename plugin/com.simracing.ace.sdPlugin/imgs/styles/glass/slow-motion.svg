<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gsm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gsm-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gsm-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gsm-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gsm-bg)" stroke="url(#gsm-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gsm-shine)"/>
  <!-- Clock face -->
  <circle cx="72" cy="60" r="28" fill="none" stroke="#4a9eff" stroke-width="2" opacity="0.8"/>
  <circle cx="72" cy="60" r="28" fill="#4a9eff" opacity="0.05"/>
  <!-- Clock ticks -->
  <line x1="72" y1="34" x2="72" y2="38" stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
  <line x1="72" y1="82" x2="72" y2="86" stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
  <line x1="46" y1="60" x2="50" y2="60" stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
  <line x1="94" y1="60" x2="98" y2="60" stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
  <!-- Slow hour hand -->
  <line x1="72" y1="60" x2="72" y2="42" stroke="#6bb8ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="72" y1="60" x2="86" y2="50" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="72" cy="60" r="2.5" fill="#6bb8ff"/>
  <!-- Turtle / slow indicator -->
  <text x="72" y="100" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#4a9eff" opacity="0.6">0.5x</text>
  <!-- Motion trail lines -->
  <path d="M36,50 Q32,60 36,70" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
  <path d="M30,48 Q26,60 30,72" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.2"/>
  <!-- Glass reflection -->
  <ellipse cx="64" cy="42" rx="12" ry="4" fill="#ffffff" opacity="0.08"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gsm-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">SLOW MO</text>
</svg>