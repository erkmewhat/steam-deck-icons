<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="grp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="grp-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="grp-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="grp-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6bb8ff"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="grp-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#grp-bg)" stroke="url(#grp-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#grp-shine)"/>
  <!-- Film strip / screen -->
  <rect x="28" y="36" width="88" height="50" rx="4" fill="none" stroke="url(#grp-warm)" stroke-width="2"/>
  <rect x="28" y="36" width="88" height="50" rx="4" fill="#4a9eff" opacity="0.05"/>
  <!-- Play triangle inside screen -->
  <polygon points="62,52 62,76 84,64" fill="#4a9eff" opacity="0.7"/>
  <polygon points="62,52 62,76 84,64" fill="none" stroke="#6bb8ff" stroke-width="1"/>
  <!-- Film perforations top -->
  <rect x="32" y="38" width="4" height="4" rx="0.5" fill="#4a9eff" opacity="0.3"/>
  <rect x="42" y="38" width="4" height="4" rx="0.5" fill="#4a9eff" opacity="0.3"/>
  <rect x="52" y="38" width="4" height="4" rx="0.5" fill="#4a9eff" opacity="0.3"/>
  <rect x="98" y="38" width="4" height="4" rx="0.5" fill="#4a9eff" opacity="0.3"/>
  <rect x="108" y="38" width="4" height="4" rx="0.5" fill="#4a9eff" opacity="0.3"/>
  <!-- Film perforations bottom -->
  <rect x="32" y="80" width="4" height="4" rx="0.5" fill="#4a9eff" opacity="0.3"/>
  <rect x="42" y="80" width="4" height="4" rx="0.5" fill="#4a9eff" opacity="0.3"/>
  <rect x="52" y="80" width="4" height="4" rx="0.5" fill="#4a9eff" opacity="0.3"/>
  <rect x="98" y="80" width="4" height="4" rx="0.5" fill="#4a9eff" opacity="0.3"/>
  <rect x="108" y="80" width="4" height="4" rx="0.5" fill="#4a9eff" opacity="0.3"/>
  <!-- Circular arrow (replay) -->
  <path d="M26,92 A8,8 0 1,1 20,86" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <polyline points="18,84 20,86 22,84" fill="none" stroke="#4a9eff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Glass reflection -->
  <rect x="32" y="38" width="36" height="2" rx="1" fill="#ffffff" opacity="0.1"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#grp-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">REPLAY</text>
</svg>