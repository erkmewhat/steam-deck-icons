<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="grs-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="grs-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="grs-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="grs-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff300"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="grs-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#grs-bg)" stroke="url(#grs-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#grs-shine)"/>
  <!-- Circular arrow -->
  <path d="M72,36 A28,28 0 1,1 46,56" fill="none" stroke="url(#grs-warm)" stroke-width="3" stroke-linecap="round"/>
  <polyline points="40,48 46,56 54,50" fill="none" stroke="#fff300" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Traffic lights (restart) -->
  <rect x="60" y="74" width="24" height="8" rx="3" fill="none" stroke="#ffaa00" stroke-width="1.2" opacity="0.6"/>
  <circle cx="67" cy="78" r="2.5" fill="#ff4444" opacity="0.7"/>
  <circle cx="77" cy="78" r="2.5" fill="#ff4444" opacity="0.7"/>
  <!-- Grid lines -->
  <line x1="36" y1="88" x2="108" y2="88" stroke="#ffaa00" stroke-width="1" opacity="0.3"/>
  <line x1="36" y1="94" x2="108" y2="94" stroke="#ffaa00" stroke-width="1" opacity="0.3"/>
  <line x1="72" y1="84" x2="72" y2="98" stroke="#ffaa00" stroke-width="1" opacity="0.3"/>
  <!-- Glass reflection -->
  <ellipse cx="62" cy="40" rx="14" ry="3" fill="#ffffff" opacity="0.08"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#grs-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">RESTART</text>
</svg>