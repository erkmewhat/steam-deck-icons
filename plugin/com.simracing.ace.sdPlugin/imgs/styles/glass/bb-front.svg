<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gbbf-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gbbf-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gbbf-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gbbf-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff300"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <linearGradient id="gbbf-disc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#777777"/>
    </linearGradient>
    <linearGradient id="gbbf-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gbbf-bg1)" stroke="url(#gbbf-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gbbf-shine)"/>
  <!-- BB text warm yellow -->
  <text x="38" y="50" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="url(#gbbf-warm)" letter-spacing="1">BB</text>
  <!-- Brake disc -->
  <circle cx="58" cy="74" r="20" fill="url(#gbbf-disc)" stroke="#999" stroke-width="1"/>
  <circle cx="58" cy="74" r="16" fill="none" stroke="#aaaaaa" stroke-width="0.5" stroke-dasharray="3,2"/>
  <circle cx="58" cy="74" r="12" fill="none" stroke="#aaaaaa" stroke-width="0.5" stroke-dasharray="3,2"/>
  <circle cx="58" cy="74" r="6" fill="#555555" stroke="#666" stroke-width="0.5"/>
  <!-- Caliper -->
  <path d="M42,64 L40,62 L40,86 L42,84 L42,64" fill="#cc3333" stroke="#aa2222" stroke-width="0.5"/>
  <!-- Glass highlight -->
  <ellipse cx="54" cy="66" rx="10" ry="4" fill="#ffffff" opacity="0.15"/>
  <!-- FRONT text -->
  <text x="58" y="102" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#ffaa00" letter-spacing="1" opacity="0.8">FRONT</text>
  <!-- Green up arrow -->
  <polygon points="116,48 106,64 111,64 111,88 121,88 121,64 126,64" fill="#22cc22" opacity="0.9"/>
  <ellipse cx="116" cy="52" rx="4" ry="2" fill="#ffffff" opacity="0.2"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gbbf-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">BIAS FWD</text>
</svg>