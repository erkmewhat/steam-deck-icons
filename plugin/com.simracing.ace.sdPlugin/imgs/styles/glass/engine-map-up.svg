<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gemu-bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gemu-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gemu-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gemu-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff300"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
    <linearGradient id="gemu-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gemu-bg1)" stroke="url(#gemu-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gemu-shine)"/>
  <!-- Engine block silhouette in warm yellow gradient -->
  <g transform="translate(30,34)">
    <!-- Main block -->
    <rect x="10" y="20" width="50" height="40" rx="3" fill="url(#gemu-warm)" opacity="0.85"/>
    <!-- Head -->
    <rect x="8" y="14" width="54" height="10" rx="2" fill="url(#gemu-warm)" opacity="0.9"/>
    <!-- Intake manifold -->
    <path d="M18,14 L18,6 L28,6 L28,14" fill="url(#gemu-warm)" opacity="0.8"/>
    <path d="M36,14 L36,2 L46,2 L46,14" fill="url(#gemu-warm)" opacity="0.8"/>
    <!-- Sump -->
    <rect x="14" y="58" width="42" height="8" rx="2" fill="url(#gemu-warm)" opacity="0.7"/>
    <!-- Exhaust -->
    <path d="M60,36 L72,36 L72,42 L60,42" fill="url(#gemu-warm)" opacity="0.7"/>
    <!-- Glass highlight -->
    <ellipse cx="35" cy="22" rx="18" ry="4" fill="#ffffff" opacity="0.15"/>
  </g>
  <!-- Green up arrow -->
  <polygon points="118,48 108,64 113,64 113,88 123,88 123,64 128,64" fill="#22cc22" opacity="0.9"/>
  <ellipse cx="118" cy="52" rx="4" ry="2" fill="#ffffff" opacity="0.2"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gemu-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">ENG MAP +</text>
</svg>