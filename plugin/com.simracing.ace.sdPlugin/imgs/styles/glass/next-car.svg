<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gnc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215"/>
      <stop offset="50%" stop-color="#180a0c"/>
      <stop offset="100%" stop-color="#0a0406"/>
    </linearGradient>
    <linearGradient id="gnc-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="50%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e20613"/>
    </linearGradient>
    <linearGradient id="gnc-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gnc-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6bb8ff"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="gnc-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613"/>
      <stop offset="100%" stop-color="#fff300"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="142" height="142" rx="14" fill="url(#gnc-bg)" stroke="url(#gnc-border)" stroke-width="1.5"/>
  <rect x="3" y="3" width="138" height="68" rx="12" fill="url(#gnc-shine)"/>
  <!-- Car silhouette -->
  <rect x="32" y="52" width="48" height="18" rx="6" fill="url(#gnc-warm)" opacity="0.7"/>
  <rect x="38" y="44" width="36" height="12" rx="4" fill="url(#gnc-warm)" opacity="0.5"/>
  <!-- Wheels -->
  <circle cx="44" cy="72" r="5" fill="#4a9eff" opacity="0.6"/>
  <circle cx="68" cy="72" r="5" fill="#4a9eff" opacity="0.6"/>
  <!-- Forward arrow -->
  <polyline points="96,50 112,64 96,78" fill="none" stroke="#4a9eff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="86" y1="64" x2="112" y2="64" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Road line -->
  <line x1="20" y1="86" x2="124" y2="86" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
  <!-- Glass reflection on car -->
  <rect x="40" y="46" width="20" height="3" rx="1.5" fill="#ffffff" opacity="0.1"/>
  <!-- Accent bar -->
  <rect x="14" y="114" width="116" height="3" rx="1.5" fill="url(#gnc-accent)"/>
  <text x="72" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1.5">NEXT CAR</text>
</svg>