<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="ai-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <filter id="ai-glow-soft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="ai-glow-crisp">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="ai-bar-top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff300" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff300" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff300" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ai-bar-bot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff300" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff300" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff300" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#ai-bg)" rx="12"/>
  <rect x="10" y="2" width="124" height="2" fill="url(#ai-bar-top)" rx="1"/>
  <rect x="10" y="140" width="124" height="2" fill="url(#ai-bar-bot)" rx="1"/>
  <g opacity="0.4" filter="url(#ai-glow-soft)">
    <circle cx="72" cy="54" r="30" fill="none" stroke="#fff300" stroke-width="2.5"/>
  </g>
  <g filter="url(#ai-glow-crisp)">
    <!-- Steering wheel -->
    <circle cx="72" cy="54" r="30" fill="none" stroke="#fff300" stroke-width="2.5" opacity="0.5"/>
    <line x1="72" y1="24" x2="72" y2="38" stroke="#fff300" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="46" y1="66" x2="56" y2="60" stroke="#fff300" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="98" y1="66" x2="88" y2="60" stroke="#fff300" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- AI text bold yellow neon -->
    <text x="72" y="62" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="bold" fill="#fff300" letter-spacing="3">AI</text>
    <!-- Circuit-board lines -->
    <line x1="20" y1="30" x2="38" y2="30" stroke="#fff300" stroke-width="1" opacity="0.4"/>
    <line x1="38" y1="30" x2="38" y2="44" stroke="#fff300" stroke-width="1" opacity="0.4"/>
    <circle cx="38" cy="44" r="2" fill="#fff300" opacity="0.4"/>
    <line x1="106" y1="30" x2="124" y2="30" stroke="#fff300" stroke-width="1" opacity="0.4"/>
    <line x1="106" y1="30" x2="106" y2="44" stroke="#fff300" stroke-width="1" opacity="0.4"/>
    <circle cx="106" cy="44" r="2" fill="#fff300" opacity="0.4"/>
    <line x1="20" y1="78" x2="38" y2="78" stroke="#fff300" stroke-width="1" opacity="0.4"/>
    <line x1="38" y1="78" x2="38" y2="66" stroke="#fff300" stroke-width="1" opacity="0.4"/>
    <circle cx="38" cy="66" r="2" fill="#fff300" opacity="0.4"/>
    <line x1="106" y1="78" x2="124" y2="78" stroke="#fff300" stroke-width="1" opacity="0.4"/>
    <line x1="106" y1="78" x2="106" y2="66" stroke="#fff300" stroke-width="1" opacity="0.4"/>
    <circle cx="106" cy="66" r="2" fill="#fff300" opacity="0.4"/>
    <!-- Extra circuit nodes -->
    <circle cx="20" cy="30" r="1.5" fill="#fff300" opacity="0.5"/>
    <circle cx="124" cy="30" r="1.5" fill="#fff300" opacity="0.5"/>
    <circle cx="20" cy="78" r="1.5" fill="#fff300" opacity="0.5"/>
    <circle cx="124" cy="78" r="1.5" fill="#fff300" opacity="0.5"/>
  </g>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" letter-spacing="1.5">AI DRIVE</text>
</svg>