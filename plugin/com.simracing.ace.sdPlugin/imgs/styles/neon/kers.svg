<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="nke-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <radialGradient id="nke-ambglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </radialGradient>
    <filter id="nke-softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur"><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
    </filter>
    <filter id="nke-neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="nke-topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nke-botbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#nke-bg)"/>
  <rect width="144" height="144" fill="url(#nke-ambglow)"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#nke-topbar)"/>
  <!-- Recycling arrow circle in white neon -->
  <g filter="url(#nke-softglow)">
    <path d="M72,22 A38,38 0 0,1 105,72" fill="none" stroke="white" stroke-width="3"/>
    <path d="M105,72 A38,38 0 0,1 55,98" fill="none" stroke="white" stroke-width="3"/>
    <path d="M55,98 A38,38 0 0,1 72,22" fill="none" stroke="white" stroke-width="3"/>
  </g>
  <g filter="url(#nke-neon)">
    <path d="M72,22 A38,38 0 0,1 105,72" fill="none" stroke="white" stroke-width="1.5"/>
    <polygon points="105,65 110,75 100,75" fill="white"/>
    <path d="M105,72 A38,38 0 0,1 55,98" fill="none" stroke="white" stroke-width="1.5"/>
    <polygon points="50,95 60,100 55,90" fill="white"/>
    <path d="M55,98 A38,38 0 0,1 72,22" fill="none" stroke="white" stroke-width="1.5"/>
    <polygon points="75,28 68,20 65,30" fill="white"/>
  </g>
  <!-- Lightning bolt in yellow neon -->
  <g filter="url(#nke-softglow)">
    <polygon points="78,30 58,62 72,62 64,95 90,55 76,55" fill="#fff300"/>
  </g>
  <g filter="url(#nke-neon)">
    <polygon points="78,30 58,62 72,62 64,95 90,55 76,55" fill="none" stroke="#fff300" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="78,30 58,62 72,62 64,95 90,55 76,55" fill="#fff300" opacity="0.5"/>
  </g>
  <rect x="0" y="134" width="144" height="10" fill="url(#nke-botbar)"/>
  <text x="72" y="128" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1.5">KERS</text>
</svg>