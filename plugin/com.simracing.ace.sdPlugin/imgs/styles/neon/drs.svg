<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="ndr-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <radialGradient id="ndr-ambglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </radialGradient>
    <filter id="ndr-softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur"><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
    </filter>
    <filter id="ndr-neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ndr-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#666666"/>
    </linearGradient>
    <linearGradient id="ndr-topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ndr-botbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#ndr-bg)"/>
  <rect width="144" height="144" fill="url(#ndr-ambglow)"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#ndr-topbar)"/>
  <!-- Rear wing matching carbon design -->
  <g filter="url(#ndr-neon)">
    <!-- Wing endplates -->
    <rect x="22" y="28" width="4" height="45" rx="1" fill="url(#ndr-chrome)" stroke="#888" stroke-width="0.5"/>
    <rect x="118" y="28" width="4" height="45" rx="1" fill="url(#ndr-chrome)" stroke="#888" stroke-width="0.5"/>
    <!-- Top flat wing element -->
    <path d="M24 32 L120 32 L122 28 L22 28 Z" fill="url(#ndr-chrome)" stroke="#aaa" stroke-width="0.5"/>
    <!-- Curved main wing element -->
    <path d="M24 32 Q72 42 120 32 L120 38 Q72 48 24 38 Z" fill="url(#ndr-chrome)" stroke="#aaa" stroke-width="0.5"/>
    <!-- Second curved element -->
    <path d="M26 44 Q72 52 118 44 L118 48 Q72 56 26 48 Z" fill="url(#ndr-chrome)" stroke="#aaa" stroke-width="0.5" opacity="0.85"/>
    <!-- Support pylons -->
    <rect x="55" y="55" width="4" height="20" fill="url(#ndr-chrome)" stroke="#888" stroke-width="0.5"/>
    <rect x="85" y="55" width="4" height="20" fill="url(#ndr-chrome)" stroke="#888" stroke-width="0.5"/>
  </g>
  <!-- DRS text in yellow neon -->
  <g filter="url(#ndr-softglow)">
    <text x="72" y="95" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="bold" fill="#fff300" text-anchor="middle" letter-spacing="4">DRS</text>
  </g>
  <g filter="url(#ndr-neon)">
    <text x="72" y="95" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="bold" fill="#fff300" text-anchor="middle" letter-spacing="4">DRS</text>
  </g>
  <rect x="0" y="134" width="144" height="10" fill="url(#ndr-botbar)"/>
  <text x="72" y="128" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1.5">DRS</text>
</svg>