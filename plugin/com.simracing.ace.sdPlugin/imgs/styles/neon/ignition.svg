<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="nig-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <radialGradient id="nig-ambglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </radialGradient>
    <filter id="nig-softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur"><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
    </filter>
    <filter id="nig-neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="nig-topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nig-botbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#nig-bg)"/>
  <rect width="144" height="144" fill="url(#nig-ambglow)"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#nig-topbar)"/>
  <!-- Key silhouette behind -->
  <g opacity="0.25">
    <rect x="66" y="68" width="12" height="40" rx="2" fill="#888"/>
    <rect x="60" y="85" width="6" height="3" fill="#888"/>
    <rect x="60" y="92" width="8" height="3" fill="#888"/>
  </g>
  <!-- Power symbol soft glow -->
  <g filter="url(#nig-softglow)">
    <path d="M52,50 A28,28 0 1,0 92,50" fill="none" stroke="#e20613" stroke-width="5" stroke-linecap="round"/>
    <line x1="72" y1="25" x2="72" y2="55" stroke="#e20613" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Power symbol crisp -->
  <g filter="url(#nig-neon)">
    <path d="M52,50 A28,28 0 1,0 92,50" fill="none" stroke="#e20613" stroke-width="3" stroke-linecap="round"/>
    <line x1="72" y1="25" x2="72" y2="55" stroke="#e20613" stroke-width="3" stroke-linecap="round"/>
  </g>
  <rect x="0" y="134" width="144" height="10" fill="url(#nig-botbar)"/>
  <text x="72" y="128" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1.5">IGNITION</text>
</svg>