<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="tc-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <filter id="tc-glow-soft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="tc-glow-crisp">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="tc-bar-top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tc-bar-bot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#tc-bg)" rx="12"/>
  <rect x="10" y="2" width="124" height="2" fill="url(#tc-bar-top)" rx="1"/>
  <rect x="10" y="140" width="124" height="2" fill="url(#tc-bar-bot)" rx="1"/>
  <g opacity="0.4" filter="url(#tc-glow-soft)">
    <rect x="44" y="26" width="50" height="32" rx="4" fill="none" stroke="#4a9eff" stroke-width="2.5"/>
    <line x1="60" y1="58" x2="48" y2="88" stroke="#4a9eff" stroke-width="2.5"/>
    <line x1="84" y1="58" x2="96" y2="88" stroke="#4a9eff" stroke-width="2.5"/>
  </g>
  <g filter="url(#tc-glow-crisp)">
    <!-- Camera body -->
    <rect x="44" y="26" width="50" height="32" rx="4" fill="none" stroke="#4a9eff" stroke-width="2"/>
    <!-- Lens -->
    <circle cx="69" cy="42" r="10" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <circle cx="69" cy="42" r="4" fill="#4a9eff" opacity="0.3"/>
    <!-- Recording dot -->
    <circle cx="88" cy="32" r="4" fill="#e20613"/>
    <circle cx="88" cy="32" r="4" fill="#e20613" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Tripod legs -->
    <line x1="62" y1="58" x2="48" y2="88" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="58" x2="72" y2="88" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
    <line x1="82" y1="58" x2="96" y2="88" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
    <!-- Tripod base bar -->
    <line x1="48" y1="88" x2="96" y2="88" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  <text x="72" y="112" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" letter-spacing="1.5">TRACK CAM</text>
</svg>