<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="ntcd-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <radialGradient id="ntcd-ambglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </radialGradient>
    <filter id="ntcd-softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur"><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
    </filter>
    <filter id="ntcd-neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ntcd-arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
    <linearGradient id="ntcd-topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ntcd-botbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#ntcd-bg)"/>
  <rect width="144" height="144" fill="url(#ntcd-ambglow)"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#ntcd-topbar)"/>
  <!-- Triangle outline soft glow in red -->
  <g filter="url(#ntcd-softglow)">
    <polygon points="55,25 20,85 90,85" fill="none" stroke="#e20613" stroke-width="4"/>
  </g>
  <!-- Triangle outline crisp -->
  <g filter="url(#ntcd-neon)">
    <polygon points="55,25 20,85 90,85" fill="none" stroke="#e20613" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
  <!-- TC text in red neon -->
  <g filter="url(#ntcd-neon)">
    <text x="55" y="72" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="#e20613" text-anchor="middle" letter-spacing="2">TC</text>
  </g>
  <!-- Red down arrow -->
  <g filter="url(#ntcd-softglow)">
    <polygon points="118,85 132,65 127,65 127,35 109,35 109,65 104,65" fill="url(#ntcd-arrow)"/>
  </g>
  <g filter="url(#ntcd-neon)">
    <polygon points="118,85 132,65 127,65 127,35 109,35 109,65 104,65" fill="none" stroke="#FF5252" stroke-width="2"/>
  </g>
  <rect x="0" y="134" width="144" height="10" fill="url(#ntcd-botbar)"/>
  <text x="72" y="128" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1.5">TC -</text>
</svg>