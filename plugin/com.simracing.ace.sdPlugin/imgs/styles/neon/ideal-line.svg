<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="il-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <filter id="il-glow-soft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="il-glow-crisp">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="il-bar-top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="il-bar-bot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#il-bg)" rx="12"/>
  <rect x="10" y="2" width="124" height="2" fill="url(#il-bar-top)" rx="1"/>
  <rect x="10" y="140" width="124" height="2" fill="url(#il-bar-bot)" rx="1"/>
  <g opacity="0.4" filter="url(#il-glow-soft)">
    <path d="M24,88 C24,88 44,20 72,50 C100,80 120,18 120,18" fill="none" stroke="#666" stroke-width="14"/>
  </g>
  <g filter="url(#il-glow-crisp)">
    <!-- Track edges (S-curve) -->
    <path d="M18,92 C18,92 40,16 72,52 C104,88 126,14 126,14" fill="none" stroke="#555" stroke-width="1.5" opacity="0.5"/>
    <path d="M30,92 C30,92 48,24 72,52 C96,80 114,14 114,14" fill="none" stroke="#555" stroke-width="1.5" opacity="0.5"/>
    <!-- Green neon dashed racing line -->
    <path d="M24,92 C24,92 44,20 72,52 C100,84 120,14 120,14" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-dasharray="8,4" stroke-linecap="round"/>
    <!-- Red apex dots -->
    <circle cx="50" cy="36" r="4" fill="#e20613"/>
    <circle cx="50" cy="36" r="4" fill="#e20613" opacity="0.6"/>
    <circle cx="94" cy="68" r="4" fill="#e20613"/>
    <circle cx="94" cy="68" r="4" fill="#e20613" opacity="0.6"/>
    <!-- Track edge markers -->
    <rect x="16" y="88" width="4" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="124" y="10" width="4" height="8" rx="1" fill="#fff" opacity="0.3"/>
  </g>
  <text x="72" y="118" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" letter-spacing="1.5">RACE LINE</text>
</svg>