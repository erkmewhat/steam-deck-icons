<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="rp-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <filter id="rp-glow-soft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="rp-glow-crisp">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="rp-bar-top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rp-bar-bot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#rp-bg)" rx="12"/>
  <rect x="10" y="2" width="124" height="2" fill="url(#rp-bar-top)" rx="1"/>
  <rect x="10" y="140" width="124" height="2" fill="url(#rp-bar-bot)" rx="1"/>
  <g opacity="0.4" filter="url(#rp-glow-soft)">
    <rect x="24" y="22" width="96" height="64" rx="4" fill="none" stroke="#666" stroke-width="2.5"/>
  </g>
  <g filter="url(#rp-glow-crisp)">
    <!-- Film strip frame -->
    <rect x="24" y="22" width="96" height="64" rx="4" fill="none" stroke="#666" stroke-width="2"/>
    <!-- Film sprocket holes top -->
    <rect x="30" y="24" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="42" y="24" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="54" y="24" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="66" y="24" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="78" y="24" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="90" y="24" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="102" y="24" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <!-- Film sprocket holes bottom -->
    <rect x="30" y="76" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="42" y="76" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="54" y="76" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="66" y="76" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="78" y="76" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="90" y="76" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <rect x="102" y="76" width="6" height="8" rx="1" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
    <!-- Rewind triangles (blue neon) -->
    <polygon points="56,54 74,42 74,66" fill="none" stroke="#4a9eff" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="74,54 92,42 92,66" fill="none" stroke="#4a9eff" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
  <text x="72" y="110" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" letter-spacing="1.5">REPLAY</text>
</svg>