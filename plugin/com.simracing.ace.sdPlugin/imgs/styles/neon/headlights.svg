<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="nhl-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <radialGradient id="nhl-ambglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </radialGradient>
    <filter id="nhl-softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur"><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
    </filter>
    <filter id="nhl-neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="nhl-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#666666"/>
    </linearGradient>
    <linearGradient id="nhl-topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nhl-botbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#nhl-bg)"/>
  <rect width="144" height="144" fill="url(#nhl-ambglow)"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#nhl-topbar)"/>
  <!-- Soft beam wash -->
  <g filter="url(#nhl-softglow)">
    <line x1="62" y1="55" x2="120" y2="35" stroke="#fff300" stroke-width="5"/>
    <line x1="62" y1="62" x2="125" y2="50" stroke="#fff300" stroke-width="5"/>
    <line x1="62" y1="69" x2="128" y2="65" stroke="#fff300" stroke-width="5"/>
    <line x1="62" y1="76" x2="125" y2="80" stroke="#fff300" stroke-width="5"/>
    <line x1="62" y1="83" x2="120" y2="95" stroke="#fff300" stroke-width="5"/>
  </g>
  <!-- Crisp neon beams -->
  <g filter="url(#nhl-neon)">
    <line x1="62" y1="55" x2="120" y2="35" stroke="#fff300" stroke-width="2" stroke-linecap="round"/>
    <line x1="62" y1="62" x2="125" y2="50" stroke="#fff300" stroke-width="2" stroke-linecap="round"/>
    <line x1="62" y1="69" x2="128" y2="65" stroke="#fff300" stroke-width="2" stroke-linecap="round"/>
    <line x1="62" y1="76" x2="125" y2="80" stroke="#fff300" stroke-width="2" stroke-linecap="round"/>
    <line x1="62" y1="83" x2="120" y2="95" stroke="#fff300" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Housing -->
  <path d="M25,45 Q25,38 32,38 L55,38 Q62,38 62,48 L62,90 Q62,100 55,100 L32,100 Q25,100 25,93 Z" fill="url(#nhl-chrome)" stroke="#888" stroke-width="1"/>
  <ellipse cx="44" cy="69" rx="12" ry="22" fill="#222" opacity="0.5"/>
  <ellipse cx="44" cy="69" rx="8" ry="16" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <rect x="0" y="134" width="144" height="10" fill="url(#nhl-botbar)"/>
  <text x="72" y="128" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1.5">HEADLIGHTS</text>
</svg>