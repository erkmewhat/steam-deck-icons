<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cc-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <filter id="cc-glow-soft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="cc-glow-crisp">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="cc-bar-top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cc-bar-bot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#cc-bg)" rx="12"/>
  <rect x="10" y="2" width="124" height="2" fill="url(#cc-bar-top)" rx="1"/>
  <rect x="10" y="140" width="124" height="2" fill="url(#cc-bar-bot)" rx="1"/>
  <g opacity="0.4" filter="url(#cc-glow-soft)">
    <rect x="52" y="18" width="40" height="24" rx="4" fill="none" stroke="#4a9eff" stroke-width="2.5"/>
    <rect x="42" y="68" width="60" height="24" rx="6" fill="none" stroke="#4a9eff" stroke-width="2.5"/>
  </g>
  <g filter="url(#cc-glow-crisp)">
    <!-- Camera above -->
    <rect x="52" y="18" width="40" height="24" rx="4" fill="none" stroke="#4a9eff" stroke-width="2"/>
    <circle cx="72" cy="30" r="6" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <circle cx="72" cy="30" r="2" fill="#4a9eff"/>
    <!-- Dotted sight lines -->
    <line x1="58" y1="42" x2="48" y2="68" stroke="#4a9eff" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
    <line x1="86" y1="42" x2="96" y2="68" stroke="#4a9eff" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
    <line x1="72" y1="42" x2="72" y2="68" stroke="#4a9eff" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
    <!-- Car below -->
    <rect x="42" y="68" width="60" height="24" rx="6" fill="none" stroke="#4a9eff" stroke-width="2"/>
    <!-- Car details -->
    <rect x="48" y="72" width="48" height="16" rx="3" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.5"/>
    <!-- Wheels -->
    <circle cx="52" cy="92" r="3" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <circle cx="92" cy="92" r="3" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
  </g>
  <text x="72" y="118" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" letter-spacing="1.5">CHASE CAM</text>
</svg>