<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="nabd-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <radialGradient id="nabd-ambglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </radialGradient>
    <filter id="nabd-softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur"><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
    </filter>
    <filter id="nabd-neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="nabd-arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
    <linearGradient id="nabd-topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nabd-botbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#nabd-bg)"/>
  <rect width="144" height="144" fill="url(#nabd-ambglow)"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#nabd-topbar)"/>
  <!-- Circle outline soft glow in red -->
  <g filter="url(#nabd-softglow)">
    <circle cx="55" cy="55" r="32" fill="none" stroke="#e20613" stroke-width="4"/>
  </g>
  <!-- Circle outline crisp -->
  <g filter="url(#nabd-neon)">
    <circle cx="55" cy="55" r="32" fill="none" stroke="#e20613" stroke-width="2.5"/>
  </g>
  <!-- ABS text in red neon -->
  <g filter="url(#nabd-neon)">
    <text x="55" y="62" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#e20613" text-anchor="middle" letter-spacing="1">ABS</text>
  </g>
  <!-- Red down arrow -->
  <g filter="url(#nabd-softglow)">
    <polygon points="118,85 132,65 127,65 127,35 109,35 109,65 104,65" fill="url(#nabd-arrow)"/>
  </g>
  <g filter="url(#nabd-neon)">
    <polygon points="118,85 132,65 127,65 127,35 109,35 109,65 104,65" fill="none" stroke="#FF5252" stroke-width="2"/>
  </g>
  <rect x="0" y="134" width="144" height="10" fill="url(#nabd-botbar)"/>
  <text x="72" y="128" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1.5">ABS -</text>
</svg>