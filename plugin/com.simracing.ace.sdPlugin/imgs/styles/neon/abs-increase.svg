<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="nabi-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <radialGradient id="nabi-ambglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </radialGradient>
    <filter id="nabi-softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur"><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
    </filter>
    <filter id="nabi-neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="nabi-arrow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#81C784"/>
    </linearGradient>
    <linearGradient id="nabi-topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nabi-botbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e20613" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e20613" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e20613" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#nabi-bg)"/>
  <rect width="144" height="144" fill="url(#nabi-ambglow)"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#nabi-topbar)"/>
  <!-- Circle outline soft glow -->
  <g filter="url(#nabi-softglow)">
    <circle cx="55" cy="55" r="32" fill="none" stroke="#fff300" stroke-width="4"/>
  </g>
  <!-- Circle outline crisp -->
  <g filter="url(#nabi-neon)">
    <circle cx="55" cy="55" r="32" fill="none" stroke="#fff300" stroke-width="2.5"/>
  </g>
  <!-- ABS text in yellow neon -->
  <g filter="url(#nabi-neon)">
    <text x="55" y="62" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#fff300" text-anchor="middle" letter-spacing="1">ABS</text>
  </g>
  <!-- Green up arrow -->
  <g filter="url(#nabi-softglow)">
    <polygon points="118,35 132,55 127,55 127,85 109,85 109,55 104,55" fill="url(#nabi-arrow)"/>
  </g>
  <g filter="url(#nabi-neon)">
    <polygon points="118,35 132,55 127,55 127,85 109,85 109,55 104,55" fill="none" stroke="#81C784" stroke-width="2"/>
  </g>
  <rect x="0" y="134" width="144" height="10" fill="url(#nabi-botbar)"/>
  <text x="72" y="128" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1.5">ABS +</text>
</svg>