<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <radialGradient id="cdr-bg"><stop offset="0%" stop-color="#252525"/><stop offset="100%" stop-color="#0c0c0c"/></radialGradient>
    <pattern id="cdr-cf" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="#1a1a1a"/><rect x="4" width="4" height="4" fill="#1f1f1f"/><rect y="4" width="4" height="4" fill="#1f1f1f"/><rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/></pattern>
    <linearGradient id="cdr-stripe" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e20613" stop-opacity="0"/><stop offset="20%" stop-color="#e20613"/><stop offset="80%" stop-color="#e20613"/><stop offset="100%" stop-color="#e20613" stop-opacity="0"/></linearGradient>
    <linearGradient id="cdr-chrome" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0e0e0"/><stop offset="30%" stop-color="#ffffff"/><stop offset="50%" stop-color="#a0a0a0"/><stop offset="75%" stop-color="#d0d0d0"/><stop offset="100%" stop-color="#707070"/></linearGradient>
    <linearGradient id="cdr-label" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cccccc"/></linearGradient>
    <filter id="cdr-shadow"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.6"/></filter>
    <filter id="cdr-glow"><feGaussianBlur stdDeviation="3.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="144" height="144" fill="url(#cdr-bg)"/>
  <rect width="144" height="144" fill="url(#cdr-cf)" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cdr-stripe)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cdr-stripe)"/>
  <!-- Chrome/metallic rear wing -->
  <g filter="url(#cdr-shadow)">
    <!-- Wing endplates -->
    <rect x="22" y="28" width="4" height="45" rx="1" fill="url(#cdr-chrome)"/>
    <rect x="118" y="28" width="4" height="45" rx="1" fill="url(#cdr-chrome)"/>
    <!-- Main wing element -->
    <path d="M24 32 L120 32 L122 28 L22 28 Z" fill="url(#cdr-chrome)"/>
    <path d="M24 32 Q72 42 120 32 L120 38 Q72 48 24 38 Z" fill="url(#cdr-chrome)"/>
    <!-- Second element -->
    <path d="M26 44 Q72 52 118 44 L118 48 Q72 56 26 48 Z" fill="url(#cdr-chrome)" opacity="0.85"/>
    <!-- Support pylons -->
    <rect x="55" y="55" width="4" height="20" fill="url(#cdr-chrome)"/>
    <rect x="85" y="55" width="4" height="20" fill="url(#cdr-chrome)"/>
  </g>
  <!-- DRS text with yellow glow -->
  <g filter="url(#cdr-glow)">
    <text x="72" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" letter-spacing="4" fill="#fff300">DRS</text>
  </g>
  <text x="72" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="2" fill="url(#cdr-label)">DRS</text>
</svg>