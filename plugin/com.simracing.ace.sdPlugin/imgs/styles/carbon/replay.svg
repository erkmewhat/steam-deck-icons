<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-rp-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-rp-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-rp-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-rp-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-rp-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-rp-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-rp-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-rp-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-rp-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-rp-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-rp-red)"/>
  <!-- Film/replay icon -->
  <g filter="url(#cb-rp-shadow)">
    <rect x="36" y="34" width="72" height="48" rx="4" fill="none" stroke="url(#cb-rp-chrome)" stroke-width="2.5"/>
    <!-- Film strip holes -->
    <circle cx="42" cy="40" r="2" fill="url(#cb-rp-chrome)" opacity="0.5"/>
    <circle cx="42" cy="52" r="2" fill="url(#cb-rp-chrome)" opacity="0.5"/>
    <circle cx="42" cy="64" r="2" fill="url(#cb-rp-chrome)" opacity="0.5"/>
    <circle cx="42" cy="76" r="2" fill="url(#cb-rp-chrome)" opacity="0.5"/>
    <circle cx="102" cy="40" r="2" fill="url(#cb-rp-chrome)" opacity="0.5"/>
    <circle cx="102" cy="52" r="2" fill="url(#cb-rp-chrome)" opacity="0.5"/>
    <circle cx="102" cy="64" r="2" fill="url(#cb-rp-chrome)" opacity="0.5"/>
    <circle cx="102" cy="76" r="2" fill="url(#cb-rp-chrome)" opacity="0.5"/>
  </g>
  <!-- Play triangle -->
  <g opacity="0.5" filter="url(#cb-rp-glow)">
    <polygon points="64,46 64,70 86,58" fill="#4a9eff"/>
  </g>
  <polygon points="65,47 65,69 85,58" fill="#4a9eff" opacity="0.9"/>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="url(#cb-rp-label)" letter-spacing="2">REPLAY</text>
</svg>