<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-rs-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-rs-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-rs-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-rs-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-rs-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-rs-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-rs-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-rs-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-rs-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-rs-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-rs-red)"/>
  <!-- Circular restart arrow -->
  <g filter="url(#cb-rs-shadow)">
    <path d="M72,35 A25,25 0 1,1 50,50" fill="none" stroke="url(#cb-rs-chrome)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g opacity="0.5" filter="url(#cb-rs-glow)">
    <polygon points="50,40 40,52 56,52" fill="#ff4444"/>
  </g>
  <polygon points="50,40 40,52 56,52" fill="#ff4444" opacity="0.9"/>
  <!-- Start lights -->
  <g filter="url(#cb-rs-shadow)">
    <circle cx="58" cy="72" r="5" fill="url(#cb-rs-chrome)" opacity="0.4"/>
    <circle cx="72" cy="72" r="5" fill="url(#cb-rs-chrome)" opacity="0.4"/>
    <circle cx="86" cy="72" r="5" fill="url(#cb-rs-chrome)" opacity="0.4"/>
  </g>
  <g opacity="0.5" filter="url(#cb-rs-glow)">
    <circle cx="58" cy="72" r="4" fill="#ff4444"/>
    <circle cx="72" cy="72" r="4" fill="#ff4444"/>
    <circle cx="86" cy="72" r="4" fill="#ff4444"/>
  </g>
  <circle cx="58" cy="72" r="3.5" fill="#ff4444" opacity="0.8"/>
  <circle cx="72" cy="72" r="3.5" fill="#ff4444" opacity="0.8"/>
  <circle cx="86" cy="72" r="3.5" fill="#ff4444" opacity="0.8"/>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="url(#cb-rs-label)" letter-spacing="2">RESTART</text>
</svg>