<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-tc-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-tc-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-tc-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-tc-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-tc-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-tc-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-tc-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-tc-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-tc-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-tc-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-tc-red)"/>
  <g filter="url(#cb-tc-shadow)">
    <rect x="46" y="40" width="44" height="30" rx="4" fill="none" stroke="url(#cb-tc-chrome)" stroke-width="2.5"/>
    <circle cx="68" cy="55" r="9" fill="none" stroke="url(#cb-tc-chrome)" stroke-width="2"/>
    <polygon points="90,46 102,40 102,64 90,58" fill="url(#cb-tc-chrome)" opacity="0.8"/>
    <rect x="62" y="70" width="12" height="16" fill="url(#cb-tc-chrome)" opacity="0.7"/>
    <rect x="52" y="82" width="32" height="4" rx="2" fill="url(#cb-tc-chrome)" opacity="0.8"/>
  </g>
  <g opacity="0.5" filter="url(#cb-tc-glow)">
    <circle cx="68" cy="55" r="3" fill="#4a9eff"/>
  </g>
  <circle cx="68" cy="55" r="3" fill="#4a9eff"/>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="url(#cb-tc-label)" letter-spacing="2">TRACK CAM</text>
</svg>