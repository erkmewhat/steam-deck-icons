<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-lb-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-lb-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-lb-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-lb-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-lb-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-lb-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-lb-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-lb-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-lb-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-lb-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-lb-red)"/>
  <g filter="url(#cb-lb-shadow)">
    <ellipse cx="72" cy="58" rx="34" ry="18" fill="none" stroke="url(#cb-lb-chrome)" stroke-width="2.5"/>
    <circle cx="72" cy="58" r="7" fill="url(#cb-lb-chrome)" opacity="0.9"/>
    <circle cx="72" cy="58" r="3" fill="#0c0c0c"/>
  </g>
  <g opacity="0.5" filter="url(#cb-lb-glow)">
    <polyline points="72,80 62,90 82,90" fill="none" stroke="#4a9eff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <polyline points="72,80 62,90 82,90" fill="none" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="72" y1="70" x2="72" y2="90" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="url(#cb-lb-label)" letter-spacing="2">LOOK BACK</text>
</svg>