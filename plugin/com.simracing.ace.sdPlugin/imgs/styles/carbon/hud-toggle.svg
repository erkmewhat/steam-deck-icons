<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-ht-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-ht-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-ht-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-ht-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-ht-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-ht-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-ht-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-ht-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-ht-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-ht-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-ht-red)"/>
  <!-- Monitor frame -->
  <g filter="url(#cb-ht-shadow)">
    <rect x="32" y="32" width="80" height="50" rx="4" fill="none" stroke="url(#cb-ht-chrome)" stroke-width="2.5"/>
  </g>
  <!-- HUD elements in green -->
  <g opacity="0.5" filter="url(#cb-ht-glow)">
    <rect x="38" y="38" width="24" height="8" rx="1" fill="#4ade80"/>
    <rect x="38" y="50" width="16" height="6" rx="1" fill="#4ade80"/>
    <rect x="38" y="60" width="20" height="6" rx="1" fill="#4ade80"/>
    <rect x="82" y="38" width="24" height="8" rx="1" fill="#4ade80"/>
    <circle cx="72" cy="62" r="8" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  </g>
  <rect x="38" y="38" width="24" height="8" rx="1" fill="#4ade80" opacity="0.7"/>
  <rect x="38" y="50" width="16" height="6" rx="1" fill="#4ade80" opacity="0.5"/>
  <rect x="38" y="60" width="20" height="6" rx="1" fill="#4ade80" opacity="0.5"/>
  <rect x="82" y="38" width="24" height="8" rx="1" fill="#4ade80" opacity="0.7"/>
  <circle cx="72" cy="62" r="8" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.7"/>
  <line x1="72" y1="54" x2="72" y2="58" stroke="#4ade80" stroke-width="1" opacity="0.7"/>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="url(#cb-ht-label)" letter-spacing="2">HUD</text>
</svg>