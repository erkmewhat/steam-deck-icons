<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <radialGradient id="ceu-bg"><stop offset="0%" stop-color="#252525"/><stop offset="100%" stop-color="#0c0c0c"/></radialGradient>
    <pattern id="ceu-cf" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="#1a1a1a"/><rect x="4" width="4" height="4" fill="#1f1f1f"/><rect y="4" width="4" height="4" fill="#1f1f1f"/><rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/></pattern>
    <linearGradient id="ceu-stripe" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e20613" stop-opacity="0"/><stop offset="20%" stop-color="#e20613"/><stop offset="80%" stop-color="#e20613"/><stop offset="100%" stop-color="#e20613" stop-opacity="0"/></linearGradient>
    <linearGradient id="ceu-ychrome" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff300"/><stop offset="30%" stop-color="#ffff66"/><stop offset="50%" stop-color="#ccaa00"/><stop offset="75%" stop-color="#fff300"/><stop offset="100%" stop-color="#997700"/></linearGradient>
    <linearGradient id="ceu-green" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#00cc44"/><stop offset="100%" stop-color="#00ff66"/></linearGradient>
    <linearGradient id="ceu-label" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cccccc"/></linearGradient>
    <filter id="ceu-shadow"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.6"/></filter>
  </defs>
  <rect width="144" height="144" fill="url(#ceu-bg)"/>
  <rect width="144" height="144" fill="url(#ceu-cf)" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#ceu-stripe)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#ceu-stripe)"/>
  <!-- Yellow chrome engine block -->
  <g filter="url(#ceu-shadow)">
    <!-- Engine body -->
    <rect x="25" y="38" width="50" height="40" rx="4" fill="url(#ceu-ychrome)"/>
    <!-- Cylinder head -->
    <rect x="30" y="28" width="40" height="12" rx="2" fill="url(#ceu-ychrome)"/>
    <!-- Intake manifold pipes -->
    <rect x="33" y="22" width="5" height="8" rx="1" fill="url(#ceu-ychrome)"/>
    <rect x="42" y="20" width="5" height="10" rx="1" fill="url(#ceu-ychrome)"/>
    <rect x="51" y="22" width="5" height="8" rx="1" fill="url(#ceu-ychrome)"/>
    <!-- Exhaust -->
    <rect x="60" y="62" width="18" height="5" rx="2" fill="url(#ceu-ychrome)"/>
    <!-- Bolt details -->
    <circle cx="32" cy="48" r="2" fill="#997700"/>
    <circle cx="32" cy="68" r="2" fill="#997700"/>
    <circle cx="68" cy="48" r="2" fill="#997700"/>
    <circle cx="68" cy="68" r="2" fill="#997700"/>
  </g>
  <!-- Green up arrow -->
  <polygon points="115,30 130,55 123,55 123,80 107,80 107,55 100,55" fill="url(#ceu-green)" filter="url(#ceu-shadow)"/>
  <text x="72" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="2" fill="url(#ceu-label)">ENG MAP +</text>
</svg>