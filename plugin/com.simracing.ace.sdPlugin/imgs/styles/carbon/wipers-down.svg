<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <radialGradient id="cwd-bg"><stop offset="0%" stop-color="#252525"/><stop offset="100%" stop-color="#0c0c0c"/></radialGradient>
    <pattern id="cwd-cf" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="#1a1a1a"/><rect x="4" width="4" height="4" fill="#1f1f1f"/><rect y="4" width="4" height="4" fill="#1f1f1f"/><rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/></pattern>
    <linearGradient id="cwd-stripe" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e20613" stop-opacity="0"/><stop offset="20%" stop-color="#e20613"/><stop offset="80%" stop-color="#e20613"/><stop offset="100%" stop-color="#e20613" stop-opacity="0"/></linearGradient>
    <linearGradient id="cwd-chrome" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0e0e0"/><stop offset="30%" stop-color="#ffffff"/><stop offset="50%" stop-color="#a0a0a0"/><stop offset="75%" stop-color="#d0d0d0"/><stop offset="100%" stop-color="#707070"/></linearGradient>
    <linearGradient id="cwd-label" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cccccc"/></linearGradient>
    <filter id="cwd-shadow"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.6"/></filter>
  </defs>
  <rect width="144" height="144" fill="url(#cwd-bg)"/>
  <rect width="144" height="144" fill="url(#cwd-cf)" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cwd-stripe)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cwd-stripe)"/>
  <!-- Chrome wiper arm -->
  <g filter="url(#cwd-shadow)">
    <circle cx="52" cy="90" r="5" fill="url(#cwd-chrome)"/>
    <line x1="52" y1="90" x2="52" y2="30" stroke="url(#cwd-chrome)" stroke-width="4" stroke-linecap="round"/>
    <path d="M48 30 Q52 25 56 30 L54 55 L50 55 Z" fill="url(#cwd-chrome)"/>
  </g>
  <!-- Curved wiper blade -->
  <path d="M42 32 Q52 22 62 32" stroke="url(#cwd-chrome)" stroke-width="3" fill="none" filter="url(#cwd-shadow)"/>
  <!-- Red down arrow -->
  <polygon points="100,75 115,50 108,50 108,30 92,30 92,50 85,50" fill="#e20613"/>
  <text x="72" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="2" fill="url(#cwd-label)">WIPER -</text>
</svg>