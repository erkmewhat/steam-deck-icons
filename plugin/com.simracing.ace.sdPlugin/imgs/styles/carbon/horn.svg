<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <radialGradient id="cho-bg"><stop offset="0%" stop-color="#252525"/><stop offset="100%" stop-color="#0c0c0c"/></radialGradient>
    <pattern id="cho-cf" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="#1a1a1a"/><rect x="4" width="4" height="4" fill="#1f1f1f"/><rect y="4" width="4" height="4" fill="#1f1f1f"/><rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/></pattern>
    <linearGradient id="cho-stripe" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e20613" stop-opacity="0"/><stop offset="20%" stop-color="#e20613"/><stop offset="80%" stop-color="#e20613"/><stop offset="100%" stop-color="#e20613" stop-opacity="0"/></linearGradient>
    <linearGradient id="cho-chrome" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0e0e0"/><stop offset="30%" stop-color="#ffffff"/><stop offset="50%" stop-color="#a0a0a0"/><stop offset="75%" stop-color="#d0d0d0"/><stop offset="100%" stop-color="#707070"/></linearGradient>
    <linearGradient id="cho-wave" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff300"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="cho-label" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cccccc"/></linearGradient>
    <filter id="cho-shadow"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.6"/></filter>
    <filter id="cho-glow"><feGaussianBlur stdDeviation="3.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="144" height="144" fill="url(#cho-bg)"/>
  <rect width="144" height="144" fill="url(#cho-cf)" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cho-stripe)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cho-stripe)"/>
  <!-- Chrome megaphone -->
  <g filter="url(#cho-shadow)">
    <path d="M30 50 L30 72 L50 72 L80 90 L80 32 L50 50 Z" fill="url(#cho-chrome)"/>
    <rect x="24" y="50" width="8" height="22" rx="2" fill="url(#cho-chrome)"/>
  </g>
  <!-- Sound waves with glow -->
  <g filter="url(#cho-glow)">
    <path d="M90 45 Q100 60 90 77" fill="none" stroke="url(#cho-wave)" stroke-width="3" stroke-linecap="round"/>
    <path d="M100 35 Q115 60 100 87" fill="none" stroke="url(#cho-wave)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M110 28 Q130 60 110 94" fill="none" stroke="url(#cho-wave)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>
  <text x="72" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="2" fill="url(#cho-label)">HORN</text>
</svg>