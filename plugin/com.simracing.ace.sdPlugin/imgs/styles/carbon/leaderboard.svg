<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-ld-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-ld-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-ld-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-ld-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-ld-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-ld-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-ld-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-ld-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-ld-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-ld-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-ld-red)"/>
  <!-- Leaderboard panel -->
  <g filter="url(#cb-ld-shadow)">
    <rect x="36" y="28" width="72" height="60" rx="4" fill="none" stroke="url(#cb-ld-chrome)" stroke-width="2"/>
  </g>
  <!-- Position rows -->
  <g opacity="0.5" filter="url(#cb-ld-glow)">
    <text x="44" y="44" font-family="Arial" font-size="10" font-weight="bold" fill="#4ade80">P1</text>
    <text x="44" y="56" font-family="Arial" font-size="10" font-weight="bold" fill="#4ade80">P2</text>
    <text x="44" y="68" font-family="Arial" font-size="10" font-weight="bold" fill="#4ade80">P3</text>
    <text x="44" y="80" font-family="Arial" font-size="10" font-weight="bold" fill="#4ade80">P4</text>
  </g>
  <rect x="58" y="36" width="40" height="6" rx="1" fill="url(#cb-ld-chrome)" opacity="0.6"/>
  <rect x="58" y="48" width="34" height="6" rx="1" fill="url(#cb-ld-chrome)" opacity="0.5"/>
  <rect x="58" y="60" width="38" height="6" rx="1" fill="url(#cb-ld-chrome)" opacity="0.4"/>
  <rect x="58" y="72" width="30" height="6" rx="1" fill="url(#cb-ld-chrome)" opacity="0.3"/>
  <text x="44" y="44" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold" fill="#4ade80" opacity="0.9">P1</text>
  <text x="44" y="56" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold" fill="#4ade80" opacity="0.7">P2</text>
  <text x="44" y="68" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold" fill="#4ade80" opacity="0.6">P3</text>
  <text x="44" y="80" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold" fill="#4ade80" opacity="0.5">P4</text>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="url(#cb-ld-label)" letter-spacing="2">LEADERBOARD</text>
</svg>