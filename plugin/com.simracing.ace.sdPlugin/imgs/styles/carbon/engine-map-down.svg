<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <radialGradient id="ced-bg"><stop offset="0%" stop-color="#252525"/><stop offset="100%" stop-color="#0c0c0c"/></radialGradient>
    <pattern id="ced-cf" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="#1a1a1a"/><rect x="4" width="4" height="4" fill="#1f1f1f"/><rect y="4" width="4" height="4" fill="#1f1f1f"/><rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/></pattern>
    <linearGradient id="ced-stripe" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e20613" stop-opacity="0"/><stop offset="20%" stop-color="#e20613"/><stop offset="80%" stop-color="#e20613"/><stop offset="100%" stop-color="#e20613" stop-opacity="0"/></linearGradient>
    <linearGradient id="ced-rchrome" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff4444"/><stop offset="30%" stop-color="#ff6666"/><stop offset="50%" stop-color="#cc2200"/><stop offset="75%" stop-color="#ff3333"/><stop offset="100%" stop-color="#991100"/></linearGradient>
    <linearGradient id="ced-label" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cccccc"/></linearGradient>
    <filter id="ced-shadow"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.6"/></filter>
  </defs>
  <rect width="144" height="144" fill="url(#ced-bg)"/>
  <rect width="144" height="144" fill="url(#ced-cf)" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#ced-stripe)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#ced-stripe)"/>
  <!-- Red chrome engine block -->
  <g filter="url(#ced-shadow)">
    <!-- Engine body -->
    <rect x="25" y="38" width="50" height="40" rx="4" fill="url(#ced-rchrome)"/>
    <!-- Cylinder head -->
    <rect x="30" y="28" width="40" height="12" rx="2" fill="url(#ced-rchrome)"/>
    <!-- Intake manifold pipes -->
    <rect x="33" y="22" width="5" height="8" rx="1" fill="url(#ced-rchrome)"/>
    <rect x="42" y="20" width="5" height="10" rx="1" fill="url(#ced-rchrome)"/>
    <rect x="51" y="22" width="5" height="8" rx="1" fill="url(#ced-rchrome)"/>
    <!-- Exhaust -->
    <rect x="60" y="62" width="18" height="5" rx="2" fill="url(#ced-rchrome)"/>
    <!-- Bolt details -->
    <circle cx="32" cy="48" r="2" fill="#991100"/>
    <circle cx="32" cy="68" r="2" fill="#991100"/>
    <circle cx="68" cy="48" r="2" fill="#991100"/>
    <circle cx="68" cy="68" r="2" fill="#991100"/>
  </g>
  <!-- Red down arrow -->
  <polygon points="115,80 130,55 123,55 123,30 107,30 107,55 100,55" fill="#e20613" filter="url(#ced-shadow)"/>
  <text x="72" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="2" fill="url(#ced-label)">ENG MAP -</text>
</svg>