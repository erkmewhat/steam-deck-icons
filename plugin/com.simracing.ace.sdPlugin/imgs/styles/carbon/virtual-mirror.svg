<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-vm-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-vm-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-vm-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-vm-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-vm-mirror" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="50%" stop-color="#5a5a7a"/>
      <stop offset="100%" stop-color="#2a2a3a"/>
    </linearGradient>
    <linearGradient id="cb-vm-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-vm-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-vm-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-vm-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-vm-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-vm-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-vm-red)"/>
  <g filter="url(#cb-vm-shadow)">
    <ellipse cx="72" cy="55" rx="42" ry="22" fill="url(#cb-vm-mirror)"/>
    <ellipse cx="72" cy="55" rx="42" ry="22" fill="none" stroke="url(#cb-vm-chrome)" stroke-width="2.5"/>
    <!-- Reflected headlights -->
    <circle cx="60" cy="58" r="4" fill="#4a9eff" opacity="0.5"/>
    <circle cx="84" cy="58" r="4" fill="#4a9eff" opacity="0.5"/>
  </g>
  <g opacity="0.4" filter="url(#cb-vm-glow)">
    <circle cx="60" cy="58" r="6" fill="#4a9eff"/>
    <circle cx="84" cy="58" r="6" fill="#4a9eff"/>
  </g>
  <!-- Reflection shine -->
  <line x1="50" y1="42" x2="70" y2="46" stroke="white" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="url(#cb-vm-label)" letter-spacing="2">MIRROR</text>
</svg>