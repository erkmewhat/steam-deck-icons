<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-sm-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-sm-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-sm-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-sm-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-sm-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-sm-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-sm-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-sm-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-sm-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-sm-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-sm-red)"/>
  <!-- Clock/timer -->
  <g filter="url(#cb-sm-shadow)">
    <circle cx="72" cy="55" r="26" fill="none" stroke="url(#cb-sm-chrome)" stroke-width="2.5"/>
    <line x1="72" y1="55" x2="72" y2="38" stroke="url(#cb-sm-chrome)" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="55" x2="84" y2="60" stroke="url(#cb-sm-chrome)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="72" cy="55" r="3" fill="url(#cb-sm-chrome)"/>
  </g>
  <!-- Slow motion trail lines -->
  <g opacity="0.5" filter="url(#cb-sm-glow)">
    <line x1="36" y1="75" x2="56" y2="75" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="80" x2="52" y2="80" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="85" x2="50" y2="85" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  </g>
  <line x1="36" y1="75" x2="56" y2="75" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="40" y1="80" x2="52" y2="80" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="44" y1="85" x2="50" y2="85" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="url(#cb-sm-label)" letter-spacing="2">SLOW MO</text>
</svg>