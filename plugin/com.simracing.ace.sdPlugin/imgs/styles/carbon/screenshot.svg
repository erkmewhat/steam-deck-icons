<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-ss-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-ss-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-ss-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-ss-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-ss-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-ss-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-ss-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-ss-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-ss-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-ss-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-ss-red)"/>
  <!-- Camera body -->
  <g filter="url(#cb-ss-shadow)">
    <path d="M36,42 L56,42 L62,34 L82,34 L88,42 L108,42 L108,80 L36,80 Z" fill="none" stroke="url(#cb-ss-chrome)" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="72" cy="60" r="14" fill="none" stroke="url(#cb-ss-chrome)" stroke-width="2"/>
    <circle cx="72" cy="60" r="8" fill="none" stroke="url(#cb-ss-chrome)" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- Flash -->
  <g opacity="0.5" filter="url(#cb-ss-glow)">
    <circle cx="72" cy="60" r="5" fill="#4a9eff"/>
  </g>
  <circle cx="72" cy="60" r="4" fill="#4a9eff" opacity="0.7"/>
  <!-- Flash indicator -->
  <circle cx="98" cy="46" r="3" fill="#fbbf24" opacity="0.7"/>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="url(#cb-ss-label)" letter-spacing="2">SCREENSHOT</text>
</svg>