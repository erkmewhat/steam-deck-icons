<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-ai-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-ai-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-ai-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-ai-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-ai-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-ai-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-ai-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-ai-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-ai-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-ai-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-ai-red)"/>
  <!-- Steering wheel -->
  <g filter="url(#cb-ai-shadow)">
    <circle cx="72" cy="55" r="24" fill="none" stroke="url(#cb-ai-chrome)" stroke-width="3"/>
    <circle cx="72" cy="55" r="6" fill="url(#cb-ai-chrome)" opacity="0.6"/>
    <line x1="72" y1="49" x2="72" y2="37" stroke="url(#cb-ai-chrome)" stroke-width="2" stroke-linecap="round"/>
    <line x1="54" y1="62" x2="48" y2="55" stroke="url(#cb-ai-chrome)" stroke-width="2" stroke-linecap="round"/>
    <line x1="90" y1="62" x2="96" y2="55" stroke="url(#cb-ai-chrome)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- AI glow accents -->
  <g opacity="0.5" filter="url(#cb-ai-glow)">
    <text x="72" y="60" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fbbf24">AI</text>
  </g>
  <text x="72" y="60" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#fbbf24">AI</text>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="url(#cb-ai-label)" letter-spacing="2">AI DRIVE</text>
</svg>