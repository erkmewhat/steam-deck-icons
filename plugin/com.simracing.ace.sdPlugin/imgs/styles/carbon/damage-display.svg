<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="cb-dd-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
    <pattern id="cb-dd-cf" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" width="4" height="4" fill="#1f1f1f"/>
      <rect y="4" width="4" height="4" fill="#1f1f1f"/>
      <rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="cb-dd-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ff1a1a"/>
    </linearGradient>
    <linearGradient id="cb-dd-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="cb-dd-label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <filter id="cb-dd-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="cb-dd-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-dd-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-dd-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-dd-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-dd-red)"/>
  <!-- Car outline top-down -->
  <g filter="url(#cb-dd-shadow)">
    <rect x="54" y="30" width="36" height="60" rx="10" fill="none" stroke="url(#cb-dd-chrome)" stroke-width="2"/>
    <!-- Wheels -->
    <rect x="48" y="40" width="6" height="12" rx="2" fill="url(#cb-dd-chrome)" opacity="0.7"/>
    <rect x="90" y="40" width="6" height="12" rx="2" fill="url(#cb-dd-chrome)" opacity="0.7"/>
    <rect x="48" y="68" width="6" height="12" rx="2" fill="url(#cb-dd-chrome)" opacity="0.7"/>
    <rect x="90" y="68" width="6" height="12" rx="2" fill="url(#cb-dd-chrome)" opacity="0.7"/>
  </g>
  <!-- Damage indicators in green -->
  <g opacity="0.5" filter="url(#cb-dd-glow)">
    <circle cx="72" cy="34" r="4" fill="#4ade80"/>
    <circle cx="72" cy="86" r="4" fill="#4ade80"/>
    <circle cx="52" cy="60" r="4" fill="#4ade80"/>
    <circle cx="92" cy="60" r="4" fill="#ff4444"/>
  </g>
  <circle cx="72" cy="34" r="3" fill="#4ade80" opacity="0.8"/>
  <circle cx="72" cy="86" r="3" fill="#4ade80" opacity="0.8"/>
  <circle cx="52" cy="60" r="3" fill="#4ade80" opacity="0.8"/>
  <circle cx="92" cy="60" r="3" fill="#ff4444" opacity="0.9"/>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="url(#cb-dd-label)" letter-spacing="2">DAMAGE</text>
</svg>