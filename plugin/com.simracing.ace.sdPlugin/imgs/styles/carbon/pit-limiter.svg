<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <defs>
    <radialGradient id="cpl-bg"><stop offset="0%" stop-color="#252525"/><stop offset="100%" stop-color="#0c0c0c"/></radialGradient>
    <pattern id="cpl-cf" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="#1a1a1a"/><rect x="4" width="4" height="4" fill="#1f1f1f"/><rect y="4" width="4" height="4" fill="#1f1f1f"/><rect x="4" y="4" width="4" height="4" fill="#1a1a1a"/></pattern>
    <linearGradient id="cpl-stripe" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e20613" stop-opacity="0"/><stop offset="20%" stop-color="#e20613"/><stop offset="80%" stop-color="#e20613"/><stop offset="100%" stop-color="#e20613" stop-opacity="0"/></linearGradient>
    <linearGradient id="cpl-chrome" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0e0e0"/><stop offset="30%" stop-color="#ffffff"/><stop offset="50%" stop-color="#a0a0a0"/><stop offset="75%" stop-color="#d0d0d0"/><stop offset="100%" stop-color="#707070"/></linearGradient>
    <linearGradient id="cpl-label" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#cccccc"/></linearGradient>
    <filter id="cpl-shadow"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.6"/></filter>
  </defs>
  <rect width="144" height="144" fill="url(#cpl-bg)"/>
  <rect width="144" height="144" fill="url(#cpl-cf)" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cpl-stripe)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cpl-stripe)"/>
  <!-- Chrome circle ring -->
  <circle cx="72" cy="55" r="32" fill="none" stroke="url(#cpl-chrome)" stroke-width="5" filter="url(#cpl-shadow)"/>
  <circle cx="72" cy="55" r="27" fill="#1a1a1a"/>
  <!-- PIT text -->
  <text x="72" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" letter-spacing="2" fill="#ffffff">PIT</text>
  <!-- 60 text -->
  <text x="72" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" letter-spacing="1" fill="#ffffff">60</text>
  <!-- Red diagonal strike -->
  <line x1="48" y1="80" x2="96" y2="30" stroke="#e20613" stroke-width="4" stroke-linecap="round"/>
  <text x="72" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="2" fill="url(#cpl-label)">PIT LIMITER</text>
</svg>