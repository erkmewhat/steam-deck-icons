    </filter>
    <filter id="cb-fc-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="144" height="144" fill="url(#cb-fc-bg)" rx="12"/>
  <rect width="144" height="144" fill="url(#cb-fc-cf)" rx="12" opacity="0.3"/>
  <rect x="0" y="0" width="144" height="3" fill="url(#cb-fc-red)"/>
  <rect x="0" y="141" width="144" height="3" fill="url(#cb-fc-red)"/>
