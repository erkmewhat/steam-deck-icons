    <circle cx="67" cy="61" r="10" fill="none" stroke="url(#cb-fc-chrome)" stroke-width="2"/>
    <polygon points="92,50 106,44 106,72 92,66" fill="url(#cb-fc-chrome)" opacity="0.8"/>
