<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>LMU Sim Racing</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 12px;
            color: #ccc;
            background: transparent;
            margin: 0;
            padding: 12px;
        }
        .sdpi-wrapper { padding: 0; }
        .sdpi-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .sdpi-item-label {
            flex: 0 0 80px;
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
        }
        .sdpi-item-value {
            flex: 1;
        }
        input[type="text"] {
            width: 100%;
            padding: 4px 8px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 3px;
            color: #fff;
            font-size: 13px;
            font-family: monospace;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #0078d4;
            outline: none;
        }
        .info {
            color: #888;
            font-size: 10px;
            margin-top: 4px;
            line-height: 1.4;
        }
        .sdpi-heading {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 12px 0 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="sdpi-wrapper">
        <div class="sdpi-heading">Hotkey</div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Key</div>
            <div class="sdpi-item-value">
                <input type="text" id="hotkey" placeholder="e.g. L, Up, RShift" />
            </div>
        </div>
        <div class="info">
            The key sent to LMU when this button is pressed.<br/>
            Must match the keyboard binding in LMU settings.<br/><br/>
            Valid keys: A-Z, Up, Down, Left, Right, RShift, LShift, RCtrl, LCtrl
        </div>
    </div>

    <script>
        let websocket = null;
        let uuid = null;
        let actionInfo = null;

        function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inPropertyInspectorUUID;
            actionInfo = JSON.parse(inActionInfo);

            websocket = new WebSocket("ws://127.0.0.1:" + inPort);

            websocket.onopen = function () {
                websocket.send(JSON.stringify({
                    event: inRegisterEvent,
                    uuid: uuid
                }));

                // Load current settings
                const settings = actionInfo.payload.settings || {};
                const hotkeyInput = document.getElementById("hotkey");
                if (settings.hotkey) {
                    hotkeyInput.value = settings.hotkey;
                }
            };

            websocket.onmessage = function (evt) {
                const data = JSON.parse(evt.data);
                if (data.event === "didReceiveSettings") {
                    const settings = data.payload.settings || {};
                    document.getElementById("hotkey").value = settings.hotkey || "";
                }
            };

            // Save on change
            document.getElementById("hotkey").addEventListener("change", function () {
                const settings = { hotkey: this.value.trim() };
                websocket.send(JSON.stringify({
                    event: "setSettings",
                    context: uuid,
                    payload: settings
                }));
            });
        }
    </script>
</body>
</html>
