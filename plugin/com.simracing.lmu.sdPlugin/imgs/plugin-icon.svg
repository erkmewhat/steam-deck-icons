<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="16" fill="#1a1a2e"/>
  <!-- Steering wheel outer ring -->
  <circle cx="128" cy="108" r="64" fill="none" stroke="#ff6b35" stroke-width="6"/>
  <!-- Steering wheel inner hub -->
  <circle cx="128" cy="108" r="14" fill="none" stroke="#ff6b35" stroke-width="4"/>
  <!-- Steering wheel spokes -->
  <line x1="128" y1="94" x2="128" y2="58" stroke="#ff6b35" stroke-width="5" stroke-linecap="round"/>
  <line x1="114" y1="108" x2="72" y2="122" stroke="#ff6b35" stroke-width="5" stroke-linecap="round"/>
  <line x1="142" y1="108" x2="184" y2="122" stroke="#ff6b35" stroke-width="5" stroke-linecap="round"/>
  <!-- Flat bottom of steering wheel -->
  <path d="M86 152 Q128 142 170 152" fill="none" stroke="#ff6b35" stroke-width="5" stroke-linecap="round"/>
  <!-- LMU text -->
  <text x="128" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="#ff6b35" letter-spacing="4">LMU</text>
</svg>