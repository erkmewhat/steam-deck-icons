<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#FFB800" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <linearGradient id="arrowDown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#FFB800" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB800" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFB800" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="52" rx="48" ry="42" fill="url(#amberGlow)"/>
  <circle cx="72" cy="55" r="32" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.12"/>
  <circle cx="72" cy="55" r="28" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <!-- TC text -->
  <g filter="url(#textShadow)">
    <text x="72" y="64" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="800" fill="url(#tcGrad)" letter-spacing="2">TC</text>
  </g>
  <!-- Down arrow -->
  <g filter="url(#glow)">
    <path d="M72 104 L84 88 L77 88 L77 78 L67 78 L67 88 L60 88 Z" fill="url(#arrowDown)"/>
  </g>
  <!-- - indicator -->
  <g opacity="0.5">
    <line x1="102" y1="55" x2="112" y2="55" stroke="#FF5252" stroke-width="2" stroke-linecap="round"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">TC DOWN</text>
</svg>