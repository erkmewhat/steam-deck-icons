<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect width="144" height="144" rx="12" fill="#1a1a2e"/>
  <!-- Monitor body -->
  <rect x="28" y="28" width="88" height="64" rx="6" fill="none" stroke="#ffffff" stroke-width="4"/>
  <!-- Screen inner glow -->
  <rect x="34" y="34" width="76" height="52" rx="3" fill="#252545"/>
  <!-- Monitor stand -->
  <line x1="72" y1="92" x2="72" y2="106" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="106" x2="90" y2="106" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- Down chevron on screen -->
  <path d="M54 50 L72 68 L90 50" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M54 62 L72 80 L90 62" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Label -->
  <text x="72" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff" opacity="0.7">DOWN</text>
</svg>