<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="ha-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#35302A"/>
      <stop offset="100%" stop-color="#12100a"/>
    </radialGradient>
    <radialGradient id="ha-flood" cx="60%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.28"/>
      <stop offset="40%" stop-color="#FFD54F" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ha-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="ha-housing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="50%" stop-color="#FFE8A0"/>
      <stop offset="100%" stop-color="#CCA030"/>
    </linearGradient>
    <linearGradient id="ha-lens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF0C0"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <filter id="ha-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ha-beamBlur" x="-10%" y="-25%" width="135%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="ha-housingGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FFD54F" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="ha-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFD54F" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#ha-bg)"/>
  <ellipse cx="85" cy="60" rx="60" ry="45" fill="url(#ha-flood)"/>
  <!-- Medium beams -->
  <g filter="url(#ha-beamBlur)" opacity="0.8">
    <polygon points="55,47 125,28 125,37 55,52" fill="url(#ha-beam)"/>
    <polygon points="55,54 128,46 128,56 55,60" fill="url(#ha-beam)"/>
    <polygon points="55,62 130,60 130,70 55,68" fill="url(#ha-beam)"/>
    <polygon points="55,70 128,77 128,88 55,78" fill="url(#ha-beam)"/>
    <polygon points="55,79 125,94 125,106 55,85" fill="url(#ha-beam)"/>
  </g>
  <!-- Beam lines -->
  <g filter="url(#ha-glow)" opacity="0.65">
    <line x1="55" y1="49" x2="124" y2="32" stroke="#FFE082" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="55" y1="56" x2="127" y2="50" stroke="#FFE082" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="55" y1="65" x2="128" y2="65" stroke="#FFE082" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="55" y1="74" x2="127" y2="80" stroke="#FFE082" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="55" y1="81" x2="124" y2="98" stroke="#FFE082" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Housing -->
  <g filter="url(#ha-housingGlow)">
    <path d="M24 42 Q24 30 36 30 L48 30 Q54 30 54 40 L54 90 Q54 100 48 100 L36 100 Q24 100 24 88 Z" fill="url(#ha-housing)"/>
    <path d="M48 35 Q54 35 54 42 L54 88 Q54 95 48 95 L48 35 Z" fill="url(#ha-lens)" opacity="0.85"/>
  </g>
  <!-- "A" badge for auto mode -->
  <g opacity="0.8">
    <circle cx="108" cy="28" r="12" fill="#12100a" stroke="#FFD54F" stroke-width="1.5"/>
    <text x="108" y="33" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#FFD54F">A</text>
  </g>
  <rect x="15" y="137.5" width="114" height="2.5" rx="1.25" fill="url(#ha-accent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#FFD54F" opacity="0.9" letter-spacing="1">AUTO</text>
</svg>