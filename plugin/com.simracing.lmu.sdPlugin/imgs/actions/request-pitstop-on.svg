<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <!-- Warm orange-tinted background -->
    <radialGradient id="rp-on-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#4A2810"/>
      <stop offset="100%" stop-color="#1a0e05"/>
    </radialGradient>
    <!-- Bright orange glow -->
    <radialGradient id="rp-on-orangeGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#FF6B35" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <!-- Brighter wrench gradient -->
    <linearGradient id="rp-on-wrenchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <!-- Brighter flag gradient -->
    <linearGradient id="rp-on-flagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFBB99"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <!-- Strong glow filter -->
    <filter id="rp-on-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rp-on-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#FF6B35" flood-opacity="0.5"/>
    </filter>
    <filter id="rp-on-outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <!-- Brighter accent -->
    <linearGradient id="rp-on-borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF8A5C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="144" height="144" fill="url(#rp-on-bg)"/>
  <ellipse cx="72" cy="52" rx="55" ry="48" fill="url(#rp-on-orangeGlow)"/>

  <!-- Extra inner glow -->
  <ellipse cx="72" cy="50" rx="35" ry="30" fill="#FF6B35" opacity="0.1"/>

  <!-- Wrench - brighter -->
  <g transform="translate(68,56) rotate(-45)" filter="url(#rp-on-shadow)">
    <rect x="-5" y="-4" width="40" height="8" rx="3" fill="url(#rp-on-wrenchGrad)"/>
    <path d="M-5,-11 L-20,-11 Q-26,-11 -26,0 Q-26,11 -20,11 L-5,11 Z" fill="url(#rp-on-wrenchGrad)"/>
    <rect x="-23" y="-4" width="13" height="8" rx="1.5" fill="#2a1810" opacity="0.8"/>
  </g>

  <!-- Flag with pole - glowing -->
  <g filter="url(#rp-on-glow)">
    <line x1="92" y1="20" x2="92" y2="60" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <rect x="94" y="22" width="22" height="16" rx="1" fill="url(#rp-on-flagGrad)"/>
    <!-- Checkered pattern -->
    <rect x="94" y="22" width="5.5" height="4" fill="#2a1810" opacity="0.7"/>
    <rect x="105" y="22" width="5.5" height="4" fill="#2a1810" opacity="0.7"/>
    <rect x="99.5" y="26" width="5.5" height="4" fill="#2a1810" opacity="0.7"/>
    <rect x="110.5" y="26" width="5.5" height="4" fill="#2a1810" opacity="0.7"/>
    <rect x="94" y="30" width="5.5" height="4" fill="#2a1810" opacity="0.7"/>
    <rect x="105" y="30" width="5.5" height="4" fill="#2a1810" opacity="0.7"/>
    <rect x="99.5" y="34" width="5.5" height="4" fill="#2a1810" opacity="0.7"/>
    <rect x="110.5" y="34" width="5.5" height="4" fill="#2a1810" opacity="0.7"/>
  </g>

  <!-- Bottom accent line - brighter -->
  <rect x="16" y="137" width="112" height="3" rx="1.5" fill="url(#rp-on-borderAccent)"/>

  <!-- Label in accent color -->
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#FF8A5C" opacity="1" letter-spacing="1">PIT REQUEST</text>
</svg>