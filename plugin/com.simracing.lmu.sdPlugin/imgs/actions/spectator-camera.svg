<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="binoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48D1E8"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00B4D8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="55" rx="48" ry="40" fill="url(#cyanGlow)"/>
  <!-- Binoculars -->
  <g filter="url(#shadow)">
    <!-- Left barrel -->
    <rect x="34" y="38" width="24" height="40" rx="12" fill="none" stroke="url(#binoGrad)" stroke-width="2.5"/>
    <!-- Left lens -->
    <ellipse cx="46" cy="78" rx="12" ry="5" fill="none" stroke="url(#binoGrad)" stroke-width="2"/>
    <ellipse cx="46" cy="78" rx="6" ry="2.5" fill="url(#binoGrad)" opacity="0.3"/>
    <!-- Right barrel -->
    <rect x="86" y="38" width="24" height="40" rx="12" fill="none" stroke="url(#binoGrad)" stroke-width="2.5"/>
    <!-- Right lens -->
    <ellipse cx="98" cy="78" rx="12" ry="5" fill="none" stroke="url(#binoGrad)" stroke-width="2"/>
    <ellipse cx="98" cy="78" rx="6" ry="2.5" fill="url(#binoGrad)" opacity="0.3"/>
    <!-- Bridge -->
    <path d="M58 48 Q72 36 86 48" fill="none" stroke="url(#binoGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Center bridge bar -->
    <rect x="58" y="52" width="28" height="6" rx="3" fill="none" stroke="url(#binoGrad)" stroke-width="2"/>
    <!-- Focus wheel -->
    <circle cx="72" cy="55" r="4" fill="url(#binoGrad)" opacity="0.4" stroke="url(#binoGrad)" stroke-width="1.5"/>
  </g>
  <!-- Lens glints -->
  <g filter="url(#glow)">
    <circle cx="43" cy="76" r="2" fill="#ffffff" opacity="0.5"/>
    <circle cx="95" cy="76" r="2" fill="#ffffff" opacity="0.5"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">SPECTATE</text>
</svg>