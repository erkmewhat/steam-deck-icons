<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <!-- Warm purple-tinted background -->
    <radialGradient id="ai-on-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2E1A42"/>
      <stop offset="100%" stop-color="#120a1a"/>
    </radialGradient>
    <!-- Bright purple glow -->
    <radialGradient id="ai-on-purpleGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#D080FF" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#B44DFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#B44DFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Brighter wheel gradient -->
    <linearGradient id="ai-on-wheelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <!-- Brighter purple gradient -->
    <linearGradient id="ai-on-purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B8FF"/>
      <stop offset="100%" stop-color="#D080FF"/>
    </linearGradient>
    <!-- Strong glow filter -->
    <filter id="ai-on-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ai-on-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#B44DFF" flood-opacity="0.5"/>
    </filter>
    <filter id="ai-on-outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7"/>
    </filter>
    <!-- Brighter accent -->
    <linearGradient id="ai-on-borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B44DFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D080FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B44DFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="144" height="144" fill="url(#ai-on-bg)"/>
  <ellipse cx="72" cy="56" rx="55" ry="50" fill="url(#ai-on-purpleGlow)"/>

  <!-- Extra inner glow -->
  <ellipse cx="72" cy="55" rx="35" ry="30" fill="#B44DFF" opacity="0.12"/>

  <!-- Steering wheel - brighter -->
  <g filter="url(#ai-on-shadow)">
    <!-- Outer ring -->
    <circle cx="72" cy="58" r="34" fill="none" stroke="url(#ai-on-wheelGrad)" stroke-width="6.5"/>
    <!-- Inner hub ring -->
    <circle cx="72" cy="58" r="11" fill="none" stroke="url(#ai-on-wheelGrad)" stroke-width="3.5"/>
    <!-- Spokes -->
    <line x1="61" y1="58" x2="38" y2="58" stroke="url(#ai-on-wheelGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="83" y1="58" x2="106" y2="58" stroke="url(#ai-on-wheelGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="72" y1="69" x2="72" y2="92" stroke="url(#ai-on-wheelGrad)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- AI text in center with strong glow -->
  <g filter="url(#ai-on-glow)">
    <text x="72" y="64" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="24" fill="url(#ai-on-purpleGrad)" letter-spacing="1">AI</text>
  </g>

  <!-- Pulsing rings - more visible -->
  <circle cx="72" cy="58" r="40" fill="none" stroke="#D080FF" stroke-width="1.2" opacity="0.4"/>
  <circle cx="72" cy="58" r="46" fill="none" stroke="#D080FF" stroke-width="0.8" opacity="0.25"/>
  <circle cx="72" cy="58" r="52" fill="none" stroke="#D080FF" stroke-width="0.5" opacity="0.15"/>

  <!-- Bottom accent line - brighter -->
  <rect x="16" y="137" width="112" height="3" rx="1.5" fill="url(#ai-on-borderAccent)"/>

  <!-- Label in accent color -->
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#D080FF" opacity="1" letter-spacing="1">AI DRIVER</text>
</svg>