<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="monGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#72b4ff"/>
      <stop offset="100%" stop-color="#4a9eff"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#12121f"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="50" rx="48" ry="38" fill="url(#blueGlow)"/>
  <!-- Monitor -->
  <g filter="url(#shadow)">
    <rect x="32" y="26" width="80" height="56" rx="4" fill="none" stroke="url(#monGrad)" stroke-width="2.5"/>
    <rect x="37" y="31" width="70" height="46" rx="2" fill="url(#screenBg)"/>
    <line x1="72" y1="82" x2="72" y2="92" stroke="url(#monGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="58" y1="92" x2="86" y2="92" stroke="url(#monGrad)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Left arrow on screen -->
  <g filter="url(#glow)">
    <path d="M82 54 L60 54 M66 44 L54 54 L66 64" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Vertical bar (prev indicator) -->
    <line x1="88" y1="44" x2="88" y2="64" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">MFD PREV</text>
</svg>