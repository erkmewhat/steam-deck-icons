<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wiperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48D1E8"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00B4D8" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00B4D8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="65" rx="48" ry="38" fill="url(#cyanGlow)"/>
  <!-- Windshield outline -->
  <path d="M22 95 L44 26 Q72 14 100 26 L122 95" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Rain drops (subtle) -->
  <g opacity="0.15">
    <circle cx="50" cy="42" r="1.5" fill="#48D1E8"/>
    <circle cx="85" cy="35" r="1.5" fill="#48D1E8"/>
    <circle cx="62" cy="55" r="1" fill="#48D1E8"/>
    <circle cx="95" cy="52" r="1" fill="#48D1E8"/>
    <circle cx="40" cy="68" r="1.2" fill="#48D1E8"/>
    <circle cx="105" cy="65" r="1.2" fill="#48D1E8"/>
  </g>
  <!-- Wiper pivot -->
  <g filter="url(#glow)">
    <circle cx="72" cy="95" r="4" fill="url(#bladeGrad)"/>
  </g>
  <!-- Wiper arm 1 (current position) -->
  <g filter="url(#shadow)">
    <line x1="72" y1="95" x2="42" y2="34" stroke="url(#wiperGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="34" x2="34" y2="38" stroke="url(#bladeGrad)" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  <!-- Wiper arm 2 (swept/ghost) -->
  <g opacity="0.3">
    <line x1="72" y1="95" x2="102" y2="34" stroke="url(#wiperGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="102" y1="34" x2="110" y2="38" stroke="url(#bladeGrad)" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Sweep arc -->
  <path d="M46 38 Q72 18 98 38" fill="none" stroke="url(#bladeGrad)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">WIPERS</text>
</svg>