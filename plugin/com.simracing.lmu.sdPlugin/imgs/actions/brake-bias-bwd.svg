<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#FF1D43" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF1D43" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4D6A"/>
      <stop offset="100%" stop-color="#FF1D43"/>
    </linearGradient>
    <linearGradient id="arrowDown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#FF1D43" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1D43" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF1D43" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF1D43" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="55" rx="48" ry="42" fill="url(#redGlow)"/>
  <!-- Brake disc hint -->
  <circle cx="72" cy="55" r="30" fill="none" stroke="#FF1D43" stroke-width="1" opacity="0.12"/>
  <!-- BB text -->
  <g filter="url(#textShadow)">
    <text x="72" y="65" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="800" fill="url(#bbGrad)" letter-spacing="2">BB</text>
  </g>
  <!-- Down arrow (backward = rear) -->
  <g filter="url(#glow)">
    <path d="M72 104 L84 88 L77 88 L77 78 L67 78 L67 88 L60 88 Z" fill="url(#arrowDown)"/>
  </g>
  <!-- REAR indicator -->
  <text x="72" y="76" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" fill="#FF5252" opacity="0.6" letter-spacing="2">REAR</text>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">BIAS BWD</text>
</svg>