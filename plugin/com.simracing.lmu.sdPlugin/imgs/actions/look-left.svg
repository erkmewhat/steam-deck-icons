<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="45%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48D1E8"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00B4D8" flood-opacity="0.2"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00B4D8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="65" cy="52" rx="48" ry="38" fill="url(#cyanGlow)"/>
  <!-- Eye looking left -->
  <g filter="url(#shadow)">
    <path d="M38 58c0 0 17-26 34-26s34 26 34 26-17 26-34 26S38 58 38 58z" fill="none" stroke="url(#eyeGrad)" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="72" cy="58" r="12" fill="none" stroke="url(#eyeGrad)" stroke-width="2.5"/>
    <!-- Pupil shifted left -->
    <circle cx="67" cy="58" r="5" fill="url(#eyeGrad)"/>
    <circle cx="65" cy="55" r="1.5" fill="#ffffff" opacity="0.7"/>
  </g>
  <!-- Left arrow -->
  <g filter="url(#glow)" opacity="0.8">
    <polyline points="38,100 22,100 22,86" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="22" y1="100" x2="48" y2="76" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">LOOK LEFT</text>
</svg>