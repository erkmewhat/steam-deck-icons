<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <!-- Warm background gradient -->
    <radialGradient id="ign-on-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#4A2028"/>
      <stop offset="100%" stop-color="#1a0a0e"/>
    </radialGradient>
    <!-- Bright red glow -->
    <radialGradient id="ign-on-redGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FF1D43" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FF1D43" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF1D43" stop-opacity="0"/>
    </radialGradient>
    <!-- Bright power symbol gradient -->
    <linearGradient id="ign-on-powerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A9E"/>
      <stop offset="100%" stop-color="#FF1D43"/>
    </linearGradient>
    <!-- Strong glow filter -->
    <filter id="ign-on-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Outer glow filter -->
    <filter id="ign-on-outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <!-- Subtle drop shadow -->
    <filter id="ign-on-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FF1D43" flood-opacity="0.5"/>
    </filter>
    <!-- Bottom border accent - brighter -->
    <linearGradient id="ign-on-borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1D43" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF4D6A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF1D43" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Warm background -->
  <rect width="144" height="144" fill="url(#ign-on-bg)"/>

  <!-- Outer glow halo -->
  <ellipse cx="72" cy="55" rx="55" ry="50" fill="none" stroke="#FF1D43" stroke-width="1" opacity="0.15" filter="url(#ign-on-outerGlow)"/>

  <!-- Bright ambient glow behind icon -->
  <ellipse cx="72" cy="58" rx="55" ry="50" fill="url(#ign-on-redGlow)"/>

  <!-- Extra glow layer -->
  <ellipse cx="72" cy="50" rx="35" ry="30" fill="#FF1D43" opacity="0.12"/>

  <!-- Power symbol with strong glow -->
  <g filter="url(#ign-on-glow)">
    <!-- Power circle (broken at top) -->
    <path d="M48 40 A32 32 0 1 0 96 40" fill="none" stroke="url(#ign-on-powerGrad)" stroke-width="7" stroke-linecap="round"/>
    <!-- Power vertical line -->
    <line x1="72" y1="26" x2="72" y2="60" stroke="url(#ign-on-powerGrad)" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Key silhouette below power symbol - brighter -->
  <g filter="url(#ign-on-shadow)" opacity="0.85">
    <rect x="68" y="88" width="8" height="16" rx="2" fill="#FFB0BE"/>
    <rect x="63" y="96" width="18" height="3" rx="1" fill="#FFB0BE"/>
    <rect x="66" y="100" width="4" height="5" rx="1" fill="#FFB0BE"/>
    <rect x="74" y="100" width="4" height="4" rx="1" fill="#FFB0BE"/>
  </g>

  <!-- Bottom accent line - brighter and thicker -->
  <rect x="16" y="137" width="112" height="3" rx="1.5" fill="url(#ign-on-borderAccent)"/>

  <!-- Label in accent color -->
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#FF4D6A" opacity="1" letter-spacing="1">IGNITION</text>
</svg>