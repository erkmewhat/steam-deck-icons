<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="ws-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A2F35"/>
      <stop offset="100%" stop-color="#0a1012"/>
    </radialGradient>
    <radialGradient id="ws-cyanGlow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#00C4E8" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#00B4D8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ws-wiperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#bbbbbb"/>
    </linearGradient>
    <linearGradient id="ws-bladeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60D8F0"/>
      <stop offset="100%" stop-color="#00C4E8"/>
    </linearGradient>
    <filter id="ws-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ws-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#00C4E8" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="ws-borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C4E8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#30D8F0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00C4E8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#ws-bg)"/>
  <ellipse cx="72" cy="65" rx="50" ry="40" fill="url(#ws-cyanGlow)"/>
  <!-- Windshield outline -->
  <path d="M22 95 L44 26 Q72 14 100 26 L122 95" fill="none" stroke="#30D8F0" stroke-width="2" opacity="0.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Rain drops (moderate) -->
  <g opacity="0.3">
    <circle cx="50" cy="42" r="1.8" fill="#60D8F0"/>
    <circle cx="85" cy="35" r="1.8" fill="#60D8F0"/>
    <circle cx="62" cy="55" r="1.3" fill="#60D8F0"/>
    <circle cx="95" cy="52" r="1.3" fill="#60D8F0"/>
    <circle cx="40" cy="68" r="1.5" fill="#60D8F0"/>
    <circle cx="105" cy="65" r="1.5" fill="#60D8F0"/>
  </g>
  <!-- Wiper pivot -->
  <g filter="url(#ws-glow)">
    <circle cx="72" cy="95" r="4.5" fill="url(#ws-bladeGrad)"/>
  </g>
  <!-- Wiper arm 1 (current position) -->
  <g filter="url(#ws-shadow)">
    <line x1="72" y1="95" x2="42" y2="34" stroke="url(#ws-wiperGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="34" x2="34" y2="38" stroke="url(#ws-bladeGrad)" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  <!-- Wiper arm 2 (swept/ghost) -->
  <g opacity="0.4">
    <line x1="72" y1="95" x2="102" y2="34" stroke="url(#ws-wiperGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="102" y1="34" x2="110" y2="38" stroke="url(#ws-bladeGrad)" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Sweep arc -->
  <path d="M46 38 Q72 18 98 38" fill="none" stroke="url(#ws-bladeGrad)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.55"/>
  <rect x="18" y="137.5" width="108" height="2.5" rx="1.25" fill="url(#ws-borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#30D8F0" opacity="0.9" letter-spacing="1">SLOW</text>
</svg>