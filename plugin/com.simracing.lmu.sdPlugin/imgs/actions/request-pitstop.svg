<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect width="144" height="144" fill="#1a1a2e"/>
  <!-- Wrench -->
  <g transform="translate(72,58) rotate(-45)">
    <!-- Wrench handle -->
    <rect x="-5" y="-4" width="40" height="8" rx="3" fill="#ffffff" opacity="0.9"/>
    <!-- Wrench head -->
    <path d="M-5,-10 L-18,-10 Q-24,-10 -24,0 Q-24,10 -18,10 L-5,10 Z" fill="#ffffff" opacity="0.9"/>
    <!-- Wrench jaw opening -->
    <rect x="-22" y="-3" width="12" height="6" rx="1" fill="#1a1a2e"/>
  </g>
  <!-- Flag -->
  <g transform="translate(88, 28)">
    <!-- Flag pole -->
    <line x1="0" y1="0" x2="0" y2="38" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Flag -->
    <path d="M2,2 L22,2 L22,18 L2,18 Z" fill="#ff6b35"/>
    <!-- Checkered pattern on flag -->
    <rect x="2" y="2" width="5" height="4" fill="#1a1a2e"/>
    <rect x="12" y="2" width="5" height="4" fill="#1a1a2e"/>
    <rect x="7" y="6" width="5" height="4" fill="#1a1a2e"/>
    <rect x="17" y="6" width="5" height="4" fill="#1a1a2e"/>
    <rect x="2" y="10" width="5" height="4" fill="#1a1a2e"/>
    <rect x="12" y="10" width="5" height="4" fill="#1a1a2e"/>
    <rect x="7" y="14" width="5" height="4" fill="#1a1a2e"/>
    <rect x="17" y="14" width="5" height="4" fill="#1a1a2e"/>
  </g>
  <!-- Label -->
  <text x="72" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35" opacity="0.9">PIT REQUEST</text>
</svg>