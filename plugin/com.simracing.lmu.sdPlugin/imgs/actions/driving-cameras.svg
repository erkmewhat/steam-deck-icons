<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="camGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48D1E8"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00B4D8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="55" rx="48" ry="40" fill="url(#cyanGlow)"/>
  <!-- Film camera body -->
  <g filter="url(#shadow)">
    <rect x="38" y="42" width="52" height="36" rx="4" fill="none" stroke="url(#camGrad)" stroke-width="2.5"/>
    <!-- Lens -->
    <circle cx="64" cy="60" r="12" fill="none" stroke="url(#camGrad)" stroke-width="2"/>
    <circle cx="64" cy="60" r="6" fill="url(#camGrad)" opacity="0.3"/>
    <circle cx="64" cy="60" r="3" fill="url(#camGrad)" opacity="0.6"/>
    <!-- Film reels on top -->
    <circle cx="50" cy="38" r="8" fill="none" stroke="url(#camGrad)" stroke-width="2"/>
    <circle cx="50" cy="38" r="3" fill="url(#camGrad)" opacity="0.4"/>
    <circle cx="74" cy="38" r="6" fill="none" stroke="url(#camGrad)" stroke-width="2"/>
    <circle cx="74" cy="38" r="2" fill="url(#camGrad)" opacity="0.4"/>
  </g>
  <!-- Cycle arrows -->
  <g filter="url(#glow)">
    <path d="M98 48 A18 18 0 0 1 98 72" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="98,72 94,65 102,65" fill="#ffffff"/>
    <path d="M104 72 A18 18 0 0 1 104 48" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="104,48 100,55 108,55" fill="#ffffff"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">COCKPIT</text>
</svg>