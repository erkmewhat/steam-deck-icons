<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
  <rect width="28" height="28" rx="2" fill="#1a1a2e"/>
  <!-- Steering wheel outer ring -->
  <circle cx="14" cy="12" r="7" fill="none" stroke="#ff6b35" stroke-width="1.5"/>
  <!-- Steering wheel inner hub -->
  <circle cx="14" cy="12" r="1.5" fill="#ff6b35"/>
  <!-- Steering wheel spokes -->
  <line x1="14" y1="10.5" x2="14" y2="6.5" stroke="#ff6b35" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12.5" y1="12" x2="8" y2="13.5" stroke="#ff6b35" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15.5" y1="12" x2="20" y2="13.5" stroke="#ff6b35" stroke-width="1.2" stroke-linecap="round"/>
  <!-- LMU text -->
  <text x="14" y="25" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="bold" fill="#ff6b35" letter-spacing="0.5">LMU</text>
</svg>