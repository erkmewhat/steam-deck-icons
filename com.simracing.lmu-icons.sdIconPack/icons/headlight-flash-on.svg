<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <!-- Warm yellow-tinted background -->
    <radialGradient id="hf-on-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3A3218"/>
      <stop offset="100%" stop-color="#18140a"/>
    </radialGradient>
    <!-- Intense flash glow -->
    <radialGradient id="hf-on-flashGlow" cx="65%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#FFD54F" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#FFD54F" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </radialGradient>
    <!-- Brighter beam gradient -->
    <linearGradient id="hf-on-beamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="hf-on-housingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
    <linearGradient id="hf-on-lensGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8C4"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <!-- Strong glow filter -->
    <filter id="hf-on-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hf-on-beamBlur" x="-10%" y="-20%" width="130%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="hf-on-housingShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#FFD54F" flood-opacity="0.4"/>
    </filter>
    <filter id="hf-on-burstGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Brighter accent -->
    <linearGradient id="hf-on-borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFE082" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="144" height="144" fill="url(#hf-on-bg)"/>
  <ellipse cx="80" cy="56" rx="60" ry="48" fill="url(#hf-on-flashGlow)"/>

  <!-- Extra bright center glow -->
  <ellipse cx="48" cy="62" rx="20" ry="30" fill="#FFE082" opacity="0.15"/>

  <!-- Light beams - brighter and more intense -->
  <g filter="url(#hf-on-beamBlur)" opacity="1">
    <polygon points="50,44 115,28 115,38 50,48" fill="url(#hf-on-beamGrad)"/>
    <polygon points="50,52 120,46 120,54 50,57" fill="url(#hf-on-beamGrad)"/>
    <polygon points="50,60 120,58 120,66 50,65" fill="url(#hf-on-beamGrad)"/>
    <polygon points="50,68 120,72 120,80 50,74" fill="url(#hf-on-beamGrad)"/>
    <polygon points="50,76 115,88 115,98 50,82" fill="url(#hf-on-beamGrad)"/>
  </g>

  <!-- Flash burst starburst - much brighter -->
  <g filter="url(#hf-on-burstGlow)" opacity="1">
    <line x1="100" y1="36" x2="122" y2="22" stroke="#FFE082" stroke-width="3" stroke-linecap="round"/>
    <line x1="106" y1="48" x2="128" y2="42" stroke="#FFE082" stroke-width="3" stroke-linecap="round"/>
    <line x1="108" y1="62" x2="130" y2="62" stroke="#FFE082" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="106" y1="76" x2="128" y2="82" stroke="#FFE082" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="88" x2="122" y2="102" stroke="#FFE082" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Headlight housing -->
  <g filter="url(#hf-on-housingShadow)">
    <path d="M20 42 Q20 30 32 30 L42 30 Q48 30 48 40 L48 86 Q48 96 42 96 L32 96 Q20 96 20 84 Z" fill="url(#hf-on-housingGrad)"/>
    <path d="M42 32 Q48 32 48 40 L48 86 Q48 94 42 94 L42 32 Z" fill="url(#hf-on-lensGrad)" opacity="1"/>
  </g>

  <!-- Bottom accent line - brighter -->
  <rect x="16" y="137" width="112" height="3" rx="1.5" fill="url(#hf-on-borderAccent)"/>

  <!-- Label in accent color -->
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#FFE082" opacity="1" letter-spacing="1">FLASH</text>
</svg>