<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect width="144" height="144" rx="12" fill="#1a1a2e"/>
  <!-- Monitor body -->
  <rect x="28" y="28" width="88" height="64" rx="6" fill="none" stroke="#44ff44" stroke-width="4"/>
  <!-- Screen inner glow -->
  <rect x="34" y="34" width="76" height="52" rx="3" fill="#1a2e1a"/>
  <!-- Monitor stand -->
  <line x1="72" y1="92" x2="72" y2="106" stroke="#44ff44" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="106" x2="90" y2="106" stroke="#44ff44" stroke-width="4" stroke-linecap="round"/>
  <!-- Plus symbol on screen -->
  <line x1="56" y1="60" x2="72" y2="60" stroke="#44ff44" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="52" x2="64" y2="68" stroke="#44ff44" stroke-width="4" stroke-linecap="round"/>
  <!-- Right arrow -->
  <path d="M78 60 L90 60 M84 54 L90 60 L84 66" fill="none" stroke="#44ff44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="72" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#44ff44" opacity="0.8">INCREASE</text>
</svg>