<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="accentGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="chevronGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="144" height="144" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="72" cy="55" rx="55" ry="48" fill="url(#accentGlow)"/>

  <!-- Sliders/Adjustment icon -->
  <g filter="url(#glow)">
    <!-- Slider track 1 (left) -->
    <line x1="48" y1="32" x2="48" y2="92" stroke="url(#iconGrad)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <!-- Slider knob 1 (high) -->
    <rect x="40" y="40" width="16" height="10" rx="3" fill="url(#iconGrad)" opacity="0.9"/>
    <!-- Knob notch 1 -->
    <line x1="48" y1="42" x2="48" y2="48" stroke="#0a0a0f" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Slider track 2 (center) -->
    <line x1="72" y1="32" x2="72" y2="92" stroke="url(#iconGrad)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <!-- Slider knob 2 (mid) -->
    <rect x="64" y="58" width="16" height="10" rx="3" fill="url(#iconGrad)" opacity="0.9"/>
    <!-- Knob notch 2 -->
    <line x1="72" y1="60" x2="72" y2="66" stroke="#0a0a0f" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Slider track 3 (right) -->
    <line x1="96" y1="32" x2="96" y2="92" stroke="url(#iconGrad)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <!-- Slider knob 3 (low) -->
    <rect x="88" y="72" width="16" height="10" rx="3" fill="url(#iconGrad)" opacity="0.9"/>
    <!-- Knob notch 3 -->
    <line x1="96" y1="74" x2="96" y2="80" stroke="#0a0a0f" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Right chevron -->
  <g filter="url(#shadow)" opacity="0.75">
    <path d="M118 100 L126 108 L118 116" fill="none" stroke="url(#chevronGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>

  <!-- Label -->
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">ADJUST</text>
</svg>