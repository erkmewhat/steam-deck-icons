<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mirrorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#72b4ff"/>
      <stop offset="100%" stop-color="#4a9eff"/>
    </linearGradient>
    <linearGradient id="reflectionGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="50" rx="48" ry="38" fill="url(#blueGlow)"/>
  <!-- Rear-view mirror shape -->
  <g filter="url(#shadow)">
    <!-- Mirror body - wide trapezoid/rounded rectangle -->
    <path d="M24 42 Q24 34 32 34 L112 34 Q120 34 120 42 L116 68 Q116 76 108 76 L36 76 Q28 76 28 68 Z" fill="url(#reflectionGrad)" stroke="url(#mirrorGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Mount/stem -->
    <path d="M72 76 L72 90 L66 96 L78 96 L72 90" fill="none" stroke="url(#mirrorGrad)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <!-- Reflection details inside mirror -->
  <g filter="url(#glow)" opacity="0.6">
    <!-- Road lines in reflection -->
    <line x1="72" y1="74" x2="72" y2="42" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <line x1="56" y1="74" x2="62" y2="42" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <line x1="88" y1="74" x2="82" y2="42" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <!-- Car headlights in distance -->
    <circle cx="66" cy="50" r="3" fill="#FFD700" opacity="0.6"/>
    <circle cx="78" cy="50" r="3" fill="#FFD700" opacity="0.6"/>
    <!-- Light glow -->
    <circle cx="66" cy="50" r="5" fill="#FFD700" opacity="0.15"/>
    <circle cx="78" cy="50" r="5" fill="#FFD700" opacity="0.15"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">MIRROR</text>
</svg>