<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="silverGlow" cx="55%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#90CAF9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="seatGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0D4F1"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90CAF9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#90CAF9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="78" cy="55" rx="48" ry="40" fill="url(#silverGlow)"/>
  <!-- Car seat silhouette -->
  <g filter="url(#shadow)">
    <!-- Seat back -->
    <path d="M70 28 Q66 28 64 32 L60 72 Q58 78 64 80 L76 82 Q80 82 80 78 L82 32 Q82 28 78 28 Z" fill="none" stroke="url(#seatGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Seat cushion -->
    <path d="M64 80 L60 88 Q58 94 64 94 L98 96 Q104 96 104 90 L102 82 Q102 78 96 78 L76 82" fill="none" stroke="url(#seatGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Headrest -->
    <rect x="66" y="22" width="16" height="10" rx="4" fill="none" stroke="url(#seatGrad)" stroke-width="2"/>
  </g>
  <!-- Backward arrow -->
  <g filter="url(#glow)">
    <line x1="46" y1="60" x2="28" y2="60" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polyline points="34,52 26,60 34,68" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">SEAT BACK</text>
</svg>