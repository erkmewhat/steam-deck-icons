<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="silverGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#90CAF9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="seatGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0D4F1"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90CAF9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#90CAF9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="65" cy="55" rx="48" ry="40" fill="url(#silverGlow)"/>
  <!-- Car seat silhouette -->
  <g filter="url(#shadow)">
    <path d="M44 32 Q40 32 38 36 L34 76 Q32 82 38 84 L50 86 Q54 86 54 82 L56 36 Q56 32 52 32 Z" fill="none" stroke="url(#seatGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M38 84 L34 92 Q32 98 38 98 L72 100 Q78 100 78 94 L76 86 Q76 82 70 82 L50 86" fill="none" stroke="url(#seatGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="40" y="26" width="16" height="10" rx="4" fill="none" stroke="url(#seatGrad)" stroke-width="2"/>
  </g>
  <!-- Down arrow -->
  <g filter="url(#glow)">
    <line x1="104" y1="44" x2="104" y2="74" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polyline points="96,66 104,76 112,66" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">SEAT DOWN</text>
</svg>