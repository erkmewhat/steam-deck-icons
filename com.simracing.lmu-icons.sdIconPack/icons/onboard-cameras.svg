<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="camGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48D1E8"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00B4D8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="55" rx="48" ry="40" fill="url(#cyanGlow)"/>
  <!-- Dashboard/windshield frame -->
  <g filter="url(#shadow)">
    <!-- Windshield trapezoid -->
    <path d="M28 78 L42 32 L102 32 L116 78 Z" fill="none" stroke="url(#camGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Dashboard bottom -->
    <path d="M24 82 L120 82" stroke="url(#camGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Steering wheel -->
    <circle cx="72" cy="92" r="12" fill="none" stroke="url(#camGrad)" stroke-width="2.5"/>
    <circle cx="72" cy="92" r="3" fill="url(#camGrad)" opacity="0.5"/>
    <!-- Road lines through windshield -->
    <line x1="72" y1="78" x2="72" y2="45" stroke="url(#camGrad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="52" y1="78" x2="60" y2="50" stroke="url(#camGrad)" stroke-width="1" opacity="0.3"/>
    <line x1="92" y1="78" x2="84" y2="50" stroke="url(#camGrad)" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Camera indicator -->
  <g filter="url(#glow)" opacity="0.9">
    <circle cx="72" cy="36" r="4" fill="#FF1D43" opacity="0.8"/>
    <circle cx="72" cy="36" r="2" fill="#ffffff" opacity="0.6"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">ONBOARD</text>
</svg>