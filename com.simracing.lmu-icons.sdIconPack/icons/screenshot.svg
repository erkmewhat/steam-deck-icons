<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="whiteGlow" cx="50%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shutterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cccccc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#cccccc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#cccccc" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="52" rx="48" ry="40" fill="url(#whiteGlow)"/>
  <!-- Camera body -->
  <g filter="url(#shadow)">
    <rect x="28" y="38" width="88" height="56" rx="6" fill="none" stroke="url(#shutterGrad)" stroke-width="2.5"/>
    <!-- Viewfinder bump -->
    <rect x="56" y="30" width="32" height="12" rx="3" fill="none" stroke="url(#shutterGrad)" stroke-width="2"/>
    <!-- Flash -->
    <rect x="38" y="44" width="10" height="6" rx="2" fill="url(#shutterGrad)" opacity="0.3"/>
  </g>
  <!-- Aperture/shutter blades -->
  <g filter="url(#glow)">
    <circle cx="72" cy="66" r="18" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- Shutter blade lines -->
    <line x1="72" y1="48" x2="80" y2="60" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="89" y1="57" x2="80" y2="68" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="89" y1="75" x2="76" y2="72" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="72" y1="84" x2="64" y2="72" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="55" y1="75" x2="64" y2="64" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="55" y1="57" x2="68" y2="60" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <!-- Center circle -->
    <circle cx="72" cy="66" r="6" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="0.5">SCREENSHOT</text>
</svg>