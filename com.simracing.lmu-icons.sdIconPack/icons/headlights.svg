<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <!-- Light beam spread gradient -->
    <radialGradient id="beamGlow" cx="25%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#FFD54F" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </radialGradient>
    <!-- Beam gradient -->
    <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Headlight housing gradient -->
    <linearGradient id="housingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
    <!-- Lens reflection -->
    <linearGradient id="lensGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Beam blur filter -->
    <filter id="beamBlur" x="-10%" y="-20%" width="130%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <!-- Housing shadow -->
    <filter id="housingShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <!-- Bottom border accent -->
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFD54F" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="144" height="144" fill="url(#bg)"/>

  <!-- Ambient beam glow across right side -->
  <ellipse cx="85" cy="60" rx="55" ry="40" fill="url(#beamGlow)"/>

  <!-- Light beams with blur -->
  <g filter="url(#beamBlur)" opacity="0.7">
    <polygon points="55,48 120,30 120,38 55,52" fill="url(#beamGrad)"/>
    <polygon points="55,55 125,48 125,56 55,60" fill="url(#beamGrad)"/>
    <polygon points="55,63 125,62 125,70 55,68" fill="url(#beamGrad)"/>
    <polygon points="55,71 125,76 125,84 55,77" fill="url(#beamGrad)"/>
    <polygon points="55,80 120,92 120,100 55,85" fill="url(#beamGrad)"/>
  </g>

  <!-- Sharp beam lines on top -->
  <g filter="url(#glow)" opacity="0.5">
    <line x1="55" y1="50" x2="118" y2="35" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
    <line x1="55" y1="57" x2="122" y2="52" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
    <line x1="55" y1="65" x2="122" y2="65" stroke="#FFD54F" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="55" y1="73" x2="122" y2="78" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
    <line x1="55" y1="80" x2="118" y2="95" stroke="#FFD54F" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Headlight housing with shadow -->
  <g filter="url(#housingShadow)">
    <path d="M24 42 Q24 30 36 30 L48 30 Q54 30 54 40 L54 90 Q54 100 48 100 L36 100 Q24 100 24 88 Z" fill="url(#housingGrad)"/>
    <!-- Lens -->
    <path d="M48 35 Q54 35 54 42 L54 88 Q54 95 48 95 L48 35 Z" fill="url(#lensGrad)" opacity="0.8"/>
    <!-- Housing inner detail -->
    <path d="M28 45 Q28 36 36 36 L44 36 Q48 36 48 42 L48 88 Q48 94 44 94 L36 94 Q28 94 28 86 Z" fill="none" stroke="#999999" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>

  <!-- Label -->
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">HEADLIGHTS</text>
</svg>