<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="flashGlow" cx="65%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FFD54F" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="housingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="beamBlur" x="-10%" y="-20%" width="130%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="housingShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="burstGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFD54F" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="80" cy="56" rx="55" ry="42" fill="url(#flashGlow)"/>
  <!-- Light beams with blur -->
  <g filter="url(#beamBlur)" opacity="0.8">
    <polygon points="50,44 115,28 115,38 50,48" fill="url(#beamGrad)"/>
    <polygon points="50,52 120,46 120,54 50,57" fill="url(#beamGrad)"/>
    <polygon points="50,60 120,58 120,66 50,65" fill="url(#beamGrad)"/>
    <polygon points="50,68 120,72 120,80 50,74" fill="url(#beamGrad)"/>
    <polygon points="50,76 115,88 115,98 50,82" fill="url(#beamGrad)"/>
  </g>
  <!-- Flash burst starburst -->
  <g filter="url(#burstGlow)" opacity="0.7">
    <line x1="100" y1="36" x2="118" y2="24" stroke="#FFD54F" stroke-width="2" stroke-linecap="round"/>
    <line x1="106" y1="48" x2="124" y2="44" stroke="#FFD54F" stroke-width="2" stroke-linecap="round"/>
    <line x1="108" y1="62" x2="126" y2="62" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="106" y1="76" x2="124" y2="80" stroke="#FFD54F" stroke-width="2" stroke-linecap="round"/>
    <line x1="100" y1="88" x2="118" y2="100" stroke="#FFD54F" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Headlight housing -->
  <g filter="url(#housingShadow)">
    <path d="M20 42 Q20 30 32 30 L42 30 Q48 30 48 40 L48 86 Q48 96 42 96 L32 96 Q20 96 20 84 Z" fill="url(#housingGrad)"/>
    <path d="M42 32 Q48 32 48 40 L48 86 Q48 94 42 94 L42 32 Z" fill="url(#lensGrad)" opacity="0.8"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">FLASH</text>
</svg>