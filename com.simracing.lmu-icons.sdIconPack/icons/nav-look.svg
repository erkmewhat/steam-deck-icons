<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="accentGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4DD4EC"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="chevronGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00B4D8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="144" height="144" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="72" cy="55" rx="55" ry="48" fill="url(#accentGlow)"/>

  <!-- Eye with arrows icon -->
  <g filter="url(#glow)">
    <!-- Eye outer shape (almond) -->
    <path d="M30 62 Q72 30 114 62 Q72 94 30 62 Z" fill="url(#iconGrad)" fill-opacity="0.1" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Iris -->
    <circle cx="72" cy="62" r="14" fill="none" stroke="url(#iconGrad)" stroke-width="3"/>
    <!-- Pupil -->
    <circle cx="72" cy="62" r="6" fill="url(#iconGrad)" opacity="0.8"/>
    <!-- Pupil highlight -->
    <circle cx="68" cy="58" r="2.5" fill="#ffffff" opacity="0.6"/>

    <!-- Left arrow -->
    <g opacity="0.7">
      <line x1="24" y1="62" x2="14" y2="62" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M19 57 L13 62 L19 67" fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Right arrow -->
    <g opacity="0.7">
      <line x1="120" y1="62" x2="130" y2="62" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M125 57 L131 62 L125 67" fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Right chevron -->
  <g filter="url(#shadow)" opacity="0.75">
    <path d="M118 100 L126 108 L118 116" fill="none" stroke="url(#chevronGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>

  <!-- Label -->
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">LOOK</text>
</svg>