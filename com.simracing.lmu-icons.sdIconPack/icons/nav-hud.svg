<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="nh-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="nh-pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="nh-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="nh-acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#nh-bg)"/>
  <!-- Large pill/capsule button shape -->
  <g filter="url(#nh-glow)">
    <rect x="16" y="30" width="112" height="54" rx="27" fill="url(#nh-pill)" stroke="#4a9eff" stroke-width="2"/>
  </g>
  <!-- Category label on left side of pill -->
  <text x="52" y="64" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff" opacity="0.95">HUD</text>
  <!-- Large arrow on right side of pill -->
  <g filter="url(#nh-glow)">
    <path d="M90 45 L108 57 L90 69" fill="none" stroke="#4a9eff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Divider line in pill -->
  <line x1="80" y1="38" x2="80" y2="76" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
  <!-- Three small dots below indicating sub-items -->
  <circle cx="56" cy="100" r="3" fill="#4a9eff" opacity="0.5"/>
  <circle cx="72" cy="100" r="3" fill="#4a9eff" opacity="0.35"/>
  <circle cx="88" cy="100" r="3" fill="#4a9eff" opacity="0.2"/>
  <!-- Subtitle -->
  <text x="72" y="128" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ffffff" opacity="0.45">5 controls</text>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#nh-acc)"/>
</svg>
