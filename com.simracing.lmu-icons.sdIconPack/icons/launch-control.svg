<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rocketGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66DD6A"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="50%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#FF1D43"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4CAF50" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="50" rx="48" ry="40" fill="url(#greenGlow)"/>
  <!-- Rocket body -->
  <g filter="url(#shadow)">
    <!-- Nose cone -->
    <path d="M72 18 Q68 18 64 30 L60 58 Q60 64 66 66 L78 66 Q84 64 84 58 L80 30 Q76 18 72 18 Z" fill="none" stroke="url(#rocketGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Window -->
    <circle cx="72" cy="40" r="6" fill="none" stroke="url(#rocketGrad)" stroke-width="2"/>
    <circle cx="72" cy="40" r="3" fill="url(#rocketGrad)" opacity="0.3"/>
    <!-- Left fin -->
    <path d="M60 54 L46 68 L52 70 L60 62" fill="none" stroke="url(#rocketGrad)" stroke-width="2" stroke-linejoin="round"/>
    <!-- Right fin -->
    <path d="M84 54 L98 68 L92 70 L84 62" fill="none" stroke="url(#rocketGrad)" stroke-width="2" stroke-linejoin="round"/>
    <!-- Nozzle -->
    <path d="M66 66 L64 72 L80 72 L78 66" fill="none" stroke="url(#rocketGrad)" stroke-width="2" stroke-linejoin="round"/>
  </g>
  <!-- Flame exhaust -->
  <g filter="url(#glow)">
    <path d="M66 72 Q64 82 68 88 Q70 92 72 96 Q74 92 76 88 Q80 82 78 72" fill="none" stroke="url(#flameGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M68 72 Q70 80 72 86 Q74 80 76 72" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- Speed lines -->
  <g opacity="0.4">
    <line x1="42" y1="48" x2="42" y2="58" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="36" y1="52" x2="36" y2="60" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
    <line x1="102" y1="48" x2="102" y2="58" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="108" y1="52" x2="108" y2="60" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">LAUNCH</text>
</svg>