<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="orangeGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wrenchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <linearGradient id="flagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A5C"/>
      <stop offset="100%" stop-color="#FF4D1A"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF6B35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" fill="url(#bg)"/>
  <ellipse cx="72" cy="52" rx="48" ry="42" fill="url(#orangeGlow)"/>
  <!-- Wrench -->
  <g transform="translate(68,56) rotate(-45)" filter="url(#shadow)">
    <rect x="-5" y="-4" width="40" height="8" rx="3" fill="url(#wrenchGrad)"/>
    <path d="M-5,-11 L-20,-11 Q-26,-11 -26,0 Q-26,11 -20,11 L-5,11 Z" fill="url(#wrenchGrad)"/>
    <rect x="-23" y="-4" width="13" height="8" rx="1.5" fill="#1a1a2e" opacity="0.8"/>
  </g>
  <!-- Flag with pole -->
  <g filter="url(#glow)">
    <line x1="92" y1="20" x2="92" y2="60" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <rect x="94" y="22" width="22" height="16" rx="1" fill="url(#flagGrad)"/>
    <!-- Checkered pattern -->
    <rect x="94" y="22" width="5.5" height="4" fill="#1a1a2e" opacity="0.7"/>
    <rect x="105" y="22" width="5.5" height="4" fill="#1a1a2e" opacity="0.7"/>
    <rect x="99.5" y="26" width="5.5" height="4" fill="#1a1a2e" opacity="0.7"/>
    <rect x="110.5" y="26" width="5.5" height="4" fill="#1a1a2e" opacity="0.7"/>
    <rect x="94" y="30" width="5.5" height="4" fill="#1a1a2e" opacity="0.7"/>
    <rect x="105" y="30" width="5.5" height="4" fill="#1a1a2e" opacity="0.7"/>
    <rect x="99.5" y="34" width="5.5" height="4" fill="#1a1a2e" opacity="0.7"/>
    <rect x="110.5" y="34" width="5.5" height="4" fill="#1a1a2e" opacity="0.7"/>
  </g>
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">PIT REQUEST</text>
</svg>