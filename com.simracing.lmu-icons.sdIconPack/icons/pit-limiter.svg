<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <rect width="144" height="144" fill="#1a1a2e"/>
  <!-- Speed limit sign circle -->
  <circle cx="72" cy="62" r="38" fill="none" stroke="#ff6b35" stroke-width="5"/>
  <!-- Diagonal line through sign -->
  <line x1="45" y1="35" x2="99" y2="89" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <!-- PIT text -->
  <text x="72" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="24" fill="#ffffff">PIT</text>
  <!-- Label -->
  <text x="72" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff6b35" opacity="0.9">PIT LIMITER</text>
</svg>