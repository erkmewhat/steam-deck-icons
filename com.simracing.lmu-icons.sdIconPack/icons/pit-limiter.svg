<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#32373C"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <!-- Orange glow -->
    <radialGradient id="orangeGlow" cx="50%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <!-- Sign border gradient -->
    <linearGradient id="signBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A5C"/>
      <stop offset="100%" stop-color="#FF4D1A"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner shadow for sign -->
    <filter id="signShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#FF6B35" flood-opacity="0.25"/>
    </filter>
    <!-- Bottom border accent -->
    <linearGradient id="borderAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF6B35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="144" height="144" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="72" cy="56" rx="48" ry="42" fill="url(#orangeGlow)"/>

  <!-- Speed limit sign with glow -->
  <g filter="url(#signShadow)">
    <!-- Outer ring -->
    <circle cx="72" cy="58" r="36" fill="none" stroke="url(#signBorder)" stroke-width="5"/>
    <!-- Inner dark fill -->
    <circle cx="72" cy="58" r="31" fill="#1a1a2e" opacity="0.6"/>
  </g>

  <!-- Speed number / PIT text -->
  <g filter="url(#glow)">
    <text x="72" y="64" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff" letter-spacing="1">PIT</text>
    <!-- Speed indicator lines -->
    <line x1="58" y1="71" x2="86" y2="71" stroke="#FF8A5C" stroke-width="1.5" opacity="0.5"/>
    <text x="72" y="82" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#FF8A5C" opacity="0.9">60</text>
  </g>

  <!-- Diagonal line through sign (limiter active) -->
  <line x1="46" y1="32" x2="98" y2="84" stroke="url(#signBorder)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Small road/lane marks at bottom -->
  <g opacity="0.15">
    <rect x="68" y="96" width="8" height="4" rx="1" fill="#ffffff"/>
    <rect x="68" y="103" width="8" height="4" rx="1" fill="#ffffff"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="20" y="138" width="104" height="2" rx="1" fill="url(#borderAccent)"/>

  <!-- Label -->
  <text x="72" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" opacity="0.85" letter-spacing="1">PIT LIMITER</text>
</svg>